<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beaver Necromancer - Phase 7.0</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background-color: #0a0a0a; font-family: 'Courier New', Courier, monospace; width: 100%; height: 100%; }
        canvas { display: block; touch-action: none; }
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
        #rotate { display: none; position: fixed; inset: 0; z-index: 10; background: #0a0a0a; color: #ce93d8; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
        #rotate .icon { font-size: 64px; animation: spin 2.4s ease-in-out infinite; }
        #rotate p { font-size: 18px; color: #fff; margin-top: 18px; }
        #rotate small { color: #8a8a8a; margin-top: 6px; }
        @keyframes spin { 0%,40% { transform: rotate(0deg); } 60%,100% { transform: rotate(90deg); } }
        @media (orientation: portrait) and (max-width: 900px) { #rotate { display: flex; } }
    </style>
</head>
<body>
    <div id="rotate">
        <div class="icon">📱</div>
        <p>Please rotate your device</p>
        <small>This game plays in landscape</small>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
    'use strict';
    // ================================================================
    //  BEAVER NECROMANCER — PHASE 7.0
    //  Architecture map (single file, labeled sections, in order):
    //    BOOT · CONFIG · DATA · AUDIO · STATE · FLOW · INPUT · WORLD
    //    SPAWN · SYSTEMS · FRENZY · MISSION · RENDER · SCENES · LOOP
    //  Endless mode reproduces the Phase 6.1 build (see GDD v7).
    // ================================================================

    // ============================== BOOT ==============================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const w = window.innerWidth, h = window.innerHeight;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        canvas.setAttribute('width', Math.round(w * dpr));
        canvas.setAttribute('height', Math.round(h * dpr));
        Object.defineProperty(canvas, 'width', { configurable:true, get(){ return w; } });
        Object.defineProperty(canvas, 'height', { configurable:true, get(){ return h; } });
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        initWorld();
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 150));

    // ============================= CONFIG =============================
    // All tuning constants. Raw per-frame values; effective speed is
    // halved by the global frame-skip in LOOP (see GDD §5).
    const FISH_COUNTERS = 2;
    const FISH_SPEED = 1.4;
    const MAX_SALMON = 40;
    const MAX_WORKERS = 600;   // collect a real horde — crowd physics keeps it cheap
    const MAX_ENEMIES = 80;
    const MAX_PROJECTILES = 120;
    const TREE_RESPAWN_TIME = 600;
    const ATTACK_INTERVAL = 18;
    const GUARD_DURATION = 900;
    const WORKER_FIRE_RANGE = 210;
    const WORKER_FIRE_INTERVAL = 50;
    const BIRD_UNLOCK_LEVEL = 6;
    const BIRD_SPEED = 2.6;
    const BIRD_ALTITUDE = 95;
    const BIRD_SPAWN_MIN = 540;
    const BIRD_SPAWN_VAR = 720;
    const EGG_GRAVITY = 0.30;
    const EGG_RADIUS = 64;
    const EGG_DMG = 25;
    const EXPLO_LIFE = 18;
    const MAX_BIRDS = 4;
    const MAX_EGGS = 12;
    const MAX_EXPLOSIONS = 12;
    const ENEMY_ATTACK_INTERVAL = 30;
    const DAM_REGEN = 0.03;
    const ENEMY_SPAWN_MIN = 420;
    const ENEMY_SPAWN_VAR = 480;
    const BEAVER_MAX_HP = 100;
    const SALMON_HEAL = 5;
    const BEAVER_STUN = 120;
    const PROJ_SPEED = 4.2;
    const FLASH_FRAMES = 6;
    const SLOWMO_FACTOR = 0.15;
    const BOSS_FIRST_LEVEL = 8;
    // --- Phase 7 additions ---
    const FRENZY_MAX = 100;
    const FRENZY_DURATION = 360;
    const FRENZY_SPEED_MULT = 1.8;
    const FRENZY_DMG_BONUS = 1;
    const FRENZY_GAIN_SALMON = 2;
    const FRENZY_GAIN_ZOMBIFY = 6;
    const FRENZY_GAIN_BERSERK = 10;
    const FRENZY_HUNT_RADIUS = 260;
    const FRENZY_RING_START = 42;      // first orbit ring radius around the beaver
    const FRENZY_RING_GAP = 27;        // spacing between rings
    const FLOOD_WAVE_SPEED = 6;
    const BASE_SPAWN_MIN = 380;
    const BASE_SPAWN_VAR = 420;
    const BIRD_COUNTERS = 2;           // birds can be shot down by ranged defenders
    const BIRD_SNIPE_RANGE_FRAC = 1/3; // ...within a third of the screen
    const SPEEDS = [1, 1.5, 2];        // world-speed toggle

    // ============================== DATA ==============================
    const STATE = { GATHERING:'Gathering', HAULING:'Hauling', DEFENDING:'Defending', IDLE:'Idle', SWINGING:'Chopping...', BERSERK:'Berserk', BUILDING:'Building', DIGGING:'Digging' };
    // Data-driven creature table. Adding an enemy = one row here + one
    // branch in drawShape(). counters = hits to kill = trips as a zombie.
    const KIND = {
        developer:   { shape:'dev',    counters:2, speed:0.85, damDamage:5,  touchDmg:3, zombieDur:3, lane:'land',  target:'dam',    unlock:2, weight:10, workerSpeed:0.95 },
        bear:        { shape:'bear',   counters:7, speed:0.70, damDamage:10, touchDmg:6, zombieDur:8, lane:'land',  target:'dam',    unlock:3, weight:6,  workerSpeed:0.80 },
        kayak:       { shape:'kayak',  counters:3, speed:1.30, damDamage:5,  touchDmg:3, zombieDur:4, lane:'river', target:'dam',    unlock:4, weight:7,  workerSpeed:1.45 },
        hunter:      { shape:'hunter', counters:3, speed:1.00, damDamage:0,  touchDmg:2, zombieDur:4, lane:'river', target:'beaver', unlock:5, weight:6,  workerSpeed:1.00, ranged:true, fireRange:260, fireInterval:90, projDmg:8 },
        doublekayak: { shape:'kayak2', counters:6, speed:1.00, damDamage:8,  touchDmg:4, zombieDur:3, lane:'river', target:'dam',    unlock:6, weight:4,  workerSpeed:1.35, splitOnDeath:2, zombieShape:'kayak', zombieCounters:3 },
        drone:       { shape:'drone',  counters:4, speed:1.10, damDamage:0,  touchDmg:0, zombieDur:5, lane:'land',  target:'dam',    unlock:7, weight:4,  workerSpeed:1.10, ranged:true, fireRange:240, fireInterval:110, projDmg:6 },
        piranha:     { shape:'piranha',counters:3, speed:1.15, damDamage:0,  touchDmg:3, zombieDur:6, lane:'river', target:'worker', unlock:3, weight:5,  workerSpeed:1.25, huntsWorkers:true, becomesBerserker:true }
    };
    const UPGRADES = [
        { name:'Sharper Teeth',     desc:'+1 damage on every undead hit', apply:()=>{ UP.dmgPerHit += 1; } },
        { name:'Thick Bones',       desc:'All fish gain +1 counter (now and future)', apply:()=>{ UP.fishCounters += 1; for (let w of workerPool) if (w.active && w.shape==='fish') { w.counters++; w.maxCounters++; } floatText(beaver.x, beaver.y-40, '+1 FISH COUNTER', '#80d8ff'); } },
        { name:'Dark Vigor',        desc:'All undead move 18% faster',    apply:()=>{ UP.workerSpeedMult *= 1.18; } },
        { name:'Wider Dread',       desc:'Necrotic aura +25% radius',     apply:()=>{ UP.auraMult *= 1.25; floatText(beaver.x, beaver.y-40, 'AURA +25%', '#ce93d8'); } },
        { name:'Frenzy',            desc:'Undead attack 20% faster',      apply:()=>{ UP.attackInterval = Math.max(5, Math.round(UP.attackInterval*0.8)); } },
        { name:'Spawning Run',      desc:'Salmon arrive more often',      apply:()=>{ UP.salmonEvery = Math.max(15, Math.round(UP.salmonEvery*0.6)); } },
        { name:'Necrotic Vitality', desc:'+30 max HP, heal to full',      apply:()=>{ beaver.maxHp += 30; beaver.hp = beaver.maxHp; } },
        { name:'Grave Bounty',      desc:'Zombies rise with +1 counter',  apply:()=>{ UP.zombieBonus += 1; } },
        { name:'Glutton',           desc:'Salmon heal +4 more',           apply:()=>{ UP.heal += 4; } }
    ];
    // ---- DAM PERMITS: dam upgrades. All perfectly normal municipal
    //      improvements. Do not read the fine print. ----
    const DAM_UP = { regenMult:1, resist:1, soulXp:0 };
    const DAM_UPGRADES = [
        { isDam:true, name:'Cozy Moss Insulation',    desc:'The dam takes 25% less damage (the moss whispers)',          apply:()=>{ DAM_UP.resist *= 0.75; } },
        { isDam:true, name:'Artisanal Bone Mortar',   desc:'Dam regenerates 3x faster (locally sourced skeletons)',      apply:()=>{ DAM_UP.regenMult *= 3; } },
        { isDam:true, name:'Soul-Powered Turbine',    desc:'Each salmon soul also grants +1 dam XP (100% clean energy)', apply:()=>{ DAM_UP.soulXp += 1; } },
        { isDam:true, name:'Community Fish Ladder',   desc:'Salmon arrive 30% more often (one-way trip)',                apply:()=>{ UP.salmonEvery = Math.max(10, Math.round(UP.salmonEvery*0.7)); } },
        { isDam:true, name:'Rustic Curb Appeal',      desc:'+50 dam max HP (the reviews are glowing. literally)',        apply:()=>{ dam.maxHp += 50; dam.hp += 50; } },
        { isDam:true, name:'Grand Reopening Sale',    desc:'Instantly gain half a level of dam XP (everything must go)', apply:()=>{ dam.xp += Math.ceil(dam.xpToNext/2); } }
    ];
    // Game modes. Systems read MODE instead of branching on strings.
    const MODES = {
        endless: { id:'endless', boss:true,  base:false, floodTarget:null, winState:false,
                   title:'ENDLESS', desc:'One river. One dam. Survive and grow.' },
        flood:   { id:'delta',   boss:false, base:false, delta:true, floodTarget:5, winState:true,
                   title:'REROUTE THE RIVER', desc:'The river forks around two enemy camps. Dam one branch, then release the reservoir — the whole river takes the other path.' },
        lodge:   { id:'lodge',   boss:true,  base:false, delta:false, floodTarget:null, winState:true, surviveFrames: 10800,
                   title:'THE LAST LODGE', desc:'Six minutes. Every developer in the county. Hold the dam until the permits expire.' },
        hunt:    { id:'hunt',    boss:true,  base:false, delta:false, floodTarget:null, winState:true, bossHunt:3,
                   title:'SINK THE FLEET', desc:'Three trawlers are coming upriver, one after another. Send every one of them to the bottom.' }
    };
    const MISSION_LIST = [MODES.flood, MODES.lodge, MODES.hunt];
    let missionIdx = 0;
    let bossKills = 0;

    // ============================= AUDIO ==============================
    let audioCtx = null;
    function audioResume() { try { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if (audioCtx.state==='suspended') audioCtx.resume(); startMusic(); } catch(e){} }
    function tone(freq, dur, type, vol, slideTo) {
        if (!audioCtx) return;
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type||'square'; o.frequency.value = freq;
        if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), audioCtx.currentTime+dur);
        g.gain.value = vol||0.08; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur+0.02);
    }
    function noise(dur, vol) {
        if (!audioCtx) return;
        let n = Math.floor(audioCtx.sampleRate*dur), buf = audioCtx.createBuffer(1,n,audioCtx.sampleRate), d = buf.getChannelData(0);
        for (let i=0;i<n;i++) d[i] = (Math.random()*2-1)*(1-i/n);
        let s = audioCtx.createBufferSource(); s.buffer=buf; let g = audioCtx.createGain(); g.gain.value=vol||0.12;
        s.connect(g); g.connect(audioCtx.destination); s.start();
    }
    const SFX = {
        zap:  ()=> tone(680,0.08,'sawtooth',0.05,1300),
        chop: ()=> tone(190,0.04,'square',0.04,120),
        thunk:()=> tone(150,0.10,'triangle',0.07,80),
        level:()=>{ tone(440,0.12,'square',0.07,660); setTimeout(()=>tone(700,0.14,'square',0.07,920),90); },
        hit:  ()=> noise(0.05,0.10),
        raise:()=> tone(180,0.22,'sawtooth',0.07,520),
        pew:  ()=> tone(950,0.07,'square',0.04,320),
        hurt: ()=>{ noise(0.08,0.16); tone(150,0.12,'square',0.09,70); },
        stun: ()=> tone(240,0.40,'sine',0.11,60),
        chirp:()=> tone(1300,0.06,'square',0.04,1900),
        boom: ()=>{ noise(0.25,0.22); tone(90,0.30,'sine',0.14,40); },
        over: ()=>{ tone(330,0.5,'sawtooth',0.12,70); setTimeout(()=>tone(160,0.6,'sawtooth',0.12,50),140); },
        horn: ()=>{ tone(110,0.7,'sawtooth',0.14,90); setTimeout(()=>tone(90,0.8,'sawtooth',0.14,70),200); },
        fanfare: ()=>{ tone(523,0.18,'square',0.1,660); setTimeout(()=>tone(660,0.18,'square',0.1,784),140); setTimeout(()=>tone(784,0.3,'square',0.1,1046),300); },
        frenzy: ()=>{ tone(70,0.6,'sawtooth',0.16,240); noise(0.3,0.14); },
        flood: ()=>{ noise(0.8,0.2); tone(60,1.2,'sine',0.16,30); }
    };
    // ---- Procedural music: a sweet woodland tune that collapses into a
    //      slow, dark ritual while the horde is frenzied. No files. ----
    const MUSIC = { on:true, next:0, step:0, timer:null };
    function noteAt(t, freq, dur, type, vol) {
        if (!audioCtx) return;
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(vol, t+0.03);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t+dur+0.05);
    }
    const SWEET_MELODY = [523,0,659,0, 784,0,659,523, 587,0,659,587, 523,0,440,0, 523,0,659,784, 880,0,784,659, 587,659,587,523, 440,0,0,0];
    const SWEET_BASS   = [131,165,175,131];
    const DARK_BASS    = [55,0,0,0, 77.8,0,0,0, 55,0,0,0, 58.3,0,73.4,0];
    function musicTick() {
        if (!audioCtx || !MUSIC.on) return;
        let ok = (gameState==='playing' || gameState==='paused' || gameState==='menu' || gameState==='briefing' || gameState==='missionSelect');
        while (MUSIC.next < audioCtx.currentTime + 0.3) {
            let dark = frenzyTimer > 0 && gameState==='playing';   // the pause menu stays cute
            let spb = dark ? 0.42 : 0.17;
            if (ok) {
                if (dark) {
                    let b = DARK_BASS[MUSIC.step % DARK_BASS.length];
                    if (b) { noteAt(MUSIC.next, b, spb*3.2, 'sawtooth', 0.05); noteAt(MUSIC.next, b*1.5, spb*3.2, 'sine', 0.02); }
                    if (MUSIC.step % 16 === 8) noteAt(MUSIC.next, 622, 1.2, 'sine', 0.02);
                    if (MUSIC.step % 8 === 4)  noteAt(MUSIC.next, 92.5, spb*2, 'triangle', 0.035);
                } else {
                    let m = SWEET_MELODY[MUSIC.step % SWEET_MELODY.length];
                    if (m) noteAt(MUSIC.next, m, 0.22, 'triangle', 0.03);
                    if (MUSIC.step % 4 === 0) noteAt(MUSIC.next, SWEET_BASS[Math.floor(MUSIC.step/4) % SWEET_BASS.length], 0.4, 'sine', 0.028);
                    if (MUSIC.step % 8 === 6) noteAt(MUSIC.next, 1046, 0.12, 'sine', 0.012);
                }
            }
            MUSIC.next += spb; MUSIC.step++;
        }
    }
    function startMusic() {
        if (MUSIC.timer || !audioCtx) return;
        MUSIC.next = audioCtx.currentTime + 0.1;
        MUSIC.timer = setInterval(musicTick, 80);
    }
    // Throttle every SFX: mass melee used to fire dozens of sounds per frame,
    // which tanked the framerate (felt like slow motion during Frenzy).
    const __sfxLast = {};
    for (const __k of Object.keys(SFX)) {
        const __fn = SFX[__k];
        SFX[__k] = () => { if (frameCount - (__sfxLast[__k]||-99) < 4) return; __sfxLast[__k] = frameCount; __fn(); };
    }

    // ============================= STATE ==============================
    // Every mutable global lives here.
    let gameState = 'intro';   // 'intro'|'menu'|'missionSelect'|'playing'|'paused'|'over'|'won'
    let MODE = MODES.endless;
    let keys = {};
    let mouse = { x: 0, y: 0 };
    let frameCount = 0;
    let runFrames = 0;
    let lastChopSfx = 0;
    let riverLeft, riverRight, riverWidth;
    let currentAura = 40;
    let enemySpawnTimer = 600;
    let salmonTimer = 60;
    let birdSpawnTimer = 720;
    let trees = [];
    let structures = [];              // flood mission: the developers' base
    let salmonPool = [], workerPool = [], enemyPool = [], projPool = [];
    let birdPool = [], eggPool = [], exploPool = [];
    let poolsInitialized = false;
    let raised = {};                  // skeleton roster tally, keyed by shape
    let maxLevelReached = 1;
    let choosingUpgrade = false;
    let currentChoices = [], upgradeButtons = [], pendingBoons = 0;
    let jobMenu = { open:false, worker:null, buttons:[] };
    let slowmoAccum = 0;
    let menuButtons = [];             // hit targets for menu / mission select
    let introPanel = 0, introShownAt = 0;
    const INTRO_PANELS = 4;
    // Frenzy ability
    let frenzyCharge = 0, frenzyTimer = 0, frenzyBtn = null;
    // Flood mission script
    let flood = { active:false, y:0, raised:0, shake:0, split:false };
    // Delta mission: river branches (each with an enemy outpost)
    let branches = [];
    let junctionY = 0;
    // Drag-box: time stops while dragging; box selects fish or places a branch dam
    let drag = { possible:false, active:false, sx:0, sy:0, x:0, y:0 };
    let groupMenu = { open:false, workers:[], x:0, y:0, buttons:[] };
    // World speed toggle + HUD buttons
    let speedIdx = 0, speedBtn = null, quitBtn = null, resumeBtn = null;
    let floatTexts = [];
    let birdSkipNext = false;
    // Water Burst: charges 3x faster than Frenzy; double-tap to detonate
    let burstCharge = 0, burstFX = [];
    let lastTap = { t:-9999, x:0, y:0 };
    // Channels: player-drawn dig lines; dug trenches fill with overflow water
    let channels = [];
    let digDraw = { active:false, drawing:false, workers:[], pts:[] };
    let pickingDam = { active:false, workers:[] };
    // Dev toolkit knobs
    let devAuraMult = 1, devWaveBonus = 0, devSpawnScale = 1, godMode = false, damGod = false;
    let devRates = {};       // 'kind' / 'giant_kind' -> spawns per minute (dev toolkit)
    let devRateAcc = {};
    let decor = [], fireflies = [];
    let bossNextLevel = BOSS_FIRST_LEVEL;

    const beaver = { x:0, y:0, w:30, h:30, speed:2, tapSpeed:1.2, baseKillRadius:95, hp:BEAVER_MAX_HP, maxHp:BEAVER_MAX_HP, stun:0, hitFlash:0, tx:null, ty:null };
    const dam = { x:0, y:0, w:0, h:30, level:1, xp:0, xpToNext:10, maxHp:100, hp:100, hitFlash:0 };
    const boss = { active:false, x:0, y:0, w:180, h:96, counters:0, maxCounters:0, hitFlash:0, state:'approach', tier:0, damTimer:0, gunTimer:0, summonTimer:0, shoveTimer:0 };
    // Live, stackable tuning the systems read instead of the raw constants.
    const UP = { fishCounters:FISH_COUNTERS, dmgPerHit:1, auraMult:1, workerSpeedMult:1, attackInterval:ATTACK_INTERVAL, salmonEvery:60, heal:SALMON_HEAL, chopTime:40, zombieBonus:0 };

    // ============================== FLOW ==============================
    function advanceIntro() { introPanel++; if (introPanel >= INTRO_PANELS) { gameState='menu'; introPanel=0; } }
    function startMode(mode) { resetGame(mode); gameState = 'playing'; }
    function gameOver() { gameState = 'over'; SFX.over(); }
    function winGame() { gameState = 'won'; SFX.fanfare(); }
    function resetGame(mode) {
        MODE = mode || MODE;
        dam.level=1; dam.xp=0; dam.xpToNext=10; dam.maxHp=100; dam.hp=dam.maxHp; dam.h=30; dam.hitFlash=0;
        beaver.maxHp=BEAVER_MAX_HP; beaver.hp=BEAVER_MAX_HP; beaver.stun=0; beaver.hitFlash=0; beaver.tx=null; beaver.ty=null;
        jobMenu.open=false; jobMenu.worker=null; jobMenu.buttons=[]; slowmoAccum=0;
        UP.fishCounters=FISH_COUNTERS; UP.dmgPerHit=1; UP.auraMult=1; UP.workerSpeedMult=1; UP.attackInterval=ATTACK_INTERVAL; UP.salmonEvery=60; UP.heal=SALMON_HEAL; UP.chopTime=40; UP.zombieBonus=0;
        maxLevelReached=1; choosingUpgrade=false; currentChoices=[]; upgradeButtons=[]; pendingBoons=0;
        DAM_UP.regenMult=1; DAM_UP.resist=1; DAM_UP.soulXp=0;
        runFrames=0; raised={};
        boss.active=false; boss.tier=0; bossNextLevel = MODE.bossHunt ? 4 : BOSS_FIRST_LEVEL; bossKills=0;
        frenzyCharge=0; frenzyTimer=0;
        flood.active=false; flood.y=0; flood.raised=0; flood.shake=0; flood.split=false;
        drag.possible=false; drag.active=false;
        groupMenu.open=false; groupMenu.workers=[]; groupMenu.buttons=[];
        speedIdx=0; floatTexts=[]; branches=[]; birdSkipNext=false;
        burstCharge=0; burstFX=[]; channels=[]; digDraw.active=false; digDraw.drawing=false; digDraw.workers=[]; digDraw.pts=[]; pickingDam.active=false; pickingDam.workers=[];
        salmonTimer=60; enemySpawnTimer=600; birdSpawnTimer=720;
        for (let s of salmonPool) s.active=false;
        for (let w of workerPool) w.active=false;
        for (let e of enemyPool) e.active=false;
        for (let p of projPool) p.active=false;
        for (let b of birdPool) b.active=false;
        for (let e of eggPool) e.active=false;
        for (let e of exploPool) e.active=false;
        initWorld();
    }
    function offerUpgrades() {
        // 2 beaver boons : 1 dam permit
        let pool = UPGRADES.slice(); currentChoices = [];
        for (let i=0;i<2 && pool.length;i++) currentChoices.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
        currentChoices.push(DAM_UPGRADES[Math.floor(Math.random()*DAM_UPGRADES.length)]);
        choosingUpgrade = true;
    }
    function applyUpgrade(u) { if (!u) return; u.apply(); choosingUpgrade=false; currentChoices=[]; upgradeButtons=[]; SFX.level(); if (pendingBoons>0) { pendingBoons--; offerUpgrades(); } }

    // ============================== INPUT =============================
    window.addEventListener('keydown', e => {
        audioResume();
        if (gameState==='intro') { gameState='menu'; return; }   // any key skips the comic

        if (gameState==='missionSelect') { if (e.key==='1'||e.key==='Enter') { resetGame(MISSION_LIST[missionIdx]); gameState='briefing'; } else if (e.key==='ArrowLeft') missionIdx=(missionIdx+MISSION_LIST.length-1)%MISSION_LIST.length; else if (e.key==='ArrowRight') missionIdx=(missionIdx+1)%MISSION_LIST.length; else if (e.key==='Escape') gameState='menu'; return; }
        if (gameState==='briefing') { gameState='playing'; return; }
        if (gameState==='over' || gameState==='won') { gameState='menu'; return; }
        if (gameState==='paused') { if (e.key==='q'||e.key==='Q') { gameState='menu'; return; } if (e.key==='p'||e.key==='P'||e.key==='Escape') gameState='playing'; return; }
        if (choosingUpgrade) { if (e.key==='1'||e.key==='2'||e.key==='3') applyUpgrade(currentChoices[+e.key-1]); return; }
        if (e.key==='p'||e.key==='P'||e.key==='Escape') { gameState='paused'; return; }
        if (e.key===' ') { tryFrenzy(); return; }
        if (e.key==='f'||e.key==='F') { tryFlood(true); return; }

    function startDigDraw(ws) {

    function resolveDamPick(px, py) {

    // Tap routing shared by mouse + touch. Returns true if consumed.
    function handlePointerDown(px, py) {
        audioResume();
        if (gameState==='intro') { gameState='menu'; return true; }   // any tap skips the comic
        if (gameState==='menu' || gameState==='missionSelect') {
            for (let b of menuButtons) { if (px>b.x && px<b.x+b.w && py>b.y && py<b.y+b.h && !b.disabled) { b.action(); break; } }
            return true;
        }
        if (gameState==='briefing') { gameState='playing'; return true; }
        if (gameState==='over' || gameState==='won') { gameState='menu'; return true; }
        if (gameState==='paused') {
            if (quitBtn && px>quitBtn.x && px<quitBtn.x+quitBtn.w && py>quitBtn.y && py<quitBtn.y+quitBtn.h) { gameState='menu'; return true; }
            gameState='playing'; return true;
        }
        if (choosingUpgrade) { for (let b of upgradeButtons) { if (px>b.x && px<b.x+b.w && py>b.y && py<b.y+b.h) { applyUpgrade(currentChoices[b.idx]); break; } } return true; }
        if (groupMenu.open) {
            for (let b of groupMenu.buttons) { if (Math.hypot(px-b.x, py-b.y) < b.r) {
                let ws = groupMenu.workers.filter(w=>w.active); closeGroupMenu();
                if (b.job==='dig') startDigDraw(ws);
                else if (b.job==='build') startBuildPick(ws);
                else { for (let w of ws) assignJob(w, b.job, true); SFX.level(); }
                return true; } }
            closeGroupMenu(); return true;
        }
        if (jobMenu.open) {
            for (let b of jobMenu.buttons) { if (Math.hypot(px-b.x, py-b.y) < b.r) {
                let w1 = jobMenu.worker; closeJobMenu();
                if (b.job==='dig') startDigDraw([w1]);
                else if (b.job==='build') startBuildPick([w1]);
                else assignJob(w1, b.job);
                return true; } }
            closeJobMenu(); return true;
        }
        // Speed toggle (top-right)
        if (speedBtn && px>speedBtn.x && px<speedBtn.x+speedBtn.w && py>speedBtn.y && py<speedBtn.y+speedBtn.h) { speedIdx=(speedIdx+1)%SPEEDS.length; return true; }
        // Frenzy HUD button (mobile + mouse parity)
        if (frenzyBtn && Math.hypot(px-frenzyBtn.x, py-frenzyBtn.y) < frenzyBtn.r) { tryFrenzy(); return true; }
        // Tap the dam to release the flood (when the reservoir is full)
        if (floodReady() && Math.abs(px-dam.x) < dam.w/2 && Math.abs(py-dam.y) < dam.h/2 + 18) { tryFlood(false); return true; }
        let w = workerAt(px, py);
        if (w) { openJobMenu(w); return true; }
        return false;   // empty ground: caller moves the beaver
    }
    // ---- Press/drag routing: a short press is a tap; dragging a box (time
    //      stops) selects a group of undead or, in the delta mission, places
    //      a branch-dam blueprint. ----
    function startPress(px, py) {
        mouse.x=px; mouse.y=py;
        if (digDraw.active) { digDraw.drawing = true; digDraw.pts = [{x:px, y:py}]; return; }   // channel drawing (time is stopped)
        if (pickingDam.active) return;
        if (gameState==='playing' && !choosingUpgrade && !jobMenu.open && !groupMenu.open && !flood.active) {
            drag.possible = true; drag.sx = px; drag.sy = py; drag.x = px; drag.y = py;
        }
    }
    function movePress(px, py) {
        mouse.x=px; mouse.y=py;
        if (digDraw.drawing) {
            let last = digDraw.pts[digDraw.pts.length-1];
            if (Math.hypot(px-last.x, py-last.y) >= 14 && digDraw.pts.length < 90) digDraw.pts.push({x:px, y:py});
            return;
        }
        if (!drag.possible) return;
        drag.x = px; drag.y = py;
        if (!drag.active && Math.hypot(px-drag.sx, py-drag.sy) > 14) drag.active = true;   // time stops
    }
    function endPress(px, py) {
        if (digDraw.drawing) { finalizeDig(); return; }
        if (digDraw.active) { digDraw.active=false; digDraw.workers=[]; floatText(px, py-20, 'dig cancelled', '#8a8a8a'); return; }
        if (pickingDam.active) { resolveDamPick(px, py); return; }
        let wasDrag = drag.active;
        drag.possible = false; drag.active = false;
        if (wasDrag) { finishDrag(); return; }
        // double-tap on open ground = WATER BURST (when charged)
        let now = Date.now();
        if (gameState==='playing' && !choosingUpgrade && !jobMenu.open && !groupMenu.open &&
            now - lastTap.t < 350 && Math.hypot(px-lastTap.x, py-lastTap.y) < 34 && burstCharge >= FRENZY_MAX && !workerAt(px,py)) {
            lastTap.t = -9999;
            waterBurst(px, py);
            return;
        }
        lastTap.t = now; lastTap.x = px; lastTap.y = py;
        if (handlePointerDown(px, py)) return;
        if (gameState==='playing') { beaver.tx=Math.max(15,Math.min(canvas.width-15,px)); beaver.ty=Math.max(15,Math.min(canvas.height-15,py)); }
    }
    function finalizeDig() {
        let ws = digDraw.workers.filter(w=>w.active);
        if (digDraw.pts.length >= 2 && ws.length) {
            let ch = { pts: digDraw.pts.map(p=>({x:p.x, y:p.y, dug:false})), filled:false, done:false };
            if (channels.length >= 8) channels.shift();
            channels.push(ch);
            for (let w of ws) { w.digChannel = ch; w.buildBranch=null; w.targetTree=null; w.state = STATE.DIGGING; }
            floatText(digDraw.pts[0].x, digDraw.pts[0].y-20, ws.length + ' undead digging', '#8d6e63');
            SFX.thunk();
        }
        digDraw.active=false; digDraw.drawing=false; digDraw.workers=[]; digDraw.pts=[];
    }
    function finishDrag() {
        let x1=Math.min(drag.sx,drag.x), x2=Math.max(drag.sx,drag.x), y1=Math.min(drag.sy,drag.y), y2=Math.max(drag.sy,drag.y);
        let group = workerPool.filter(w => w.active && w.shape!=='berserker' && w.x>x1 && w.x<x2 && w.y>y1 && w.y<y2);
        if (group.length) { openGroupMenu(group, (x1+x2)/2, (y1+y2)/2); return; }
        if (MODE.delta) {
            let cyy = (y1+y2)/2;
            for (let b of branches) {
                if (b.blocked || b.blueprint) continue;
                if (cyy > b.topY+10 && cyy < b.botY-80 && x2 > b.cx-b.w/2 && x1 < b.cx+b.w/2) {
                    b.blueprint = { y: cyy, need: Math.max(6, Math.round(b.w/9)), have: 0 };
                    floatText(b.cx, cyy-24, 'DAM SITE — send fish to BUILD', '#4fc3f7');
                    SFX.thunk();
                    return;
                }
            }
        }
    }
    canvas.addEventListener('mousedown', e => { audioResume(); startPress(e.clientX, e.clientY); });

    function workerAt(px, py) {
        let best = null, bestDist = 28;
        for (let w of workerPool) { if (!w.active) continue; let d = Math.hypot(px - w.x, py - w.y); if (d < bestDist) { bestDist = d; best = w; } }
        return best;
    }
    function touchPoint(t) { let r = canvas.getBoundingClientRect(); return { x: t.clientX - r.left, y: t.clientY - r.top }; }
    canvas.addEventListener('touchstart', e => { e.preventDefault(); audioResume(); let p = touchPoint(e.changedTouches[0]); startPress(p.x, p.y); }, { passive:false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); let p = touchPoint(e.changedTouches[0]); movePress(p.x, p.y); }, { passive:false });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); let p = touchPoint(e.changedTouches[0]); endPress(p.x, p.y); }, { passive:false });

    // ============================== WORLD =============================
    function initWorld() {
        riverLeft = canvas.width / 3; riverRight = (canvas.width / 3) * 2; riverWidth = riverRight - riverLeft;
        dam.w = riverWidth; dam.x = riverLeft + (riverWidth / 2); dam.y = canvas.height * 0.25;
        beaver.x = canvas.width / 2; beaver.y = canvas.height * 0.75;
        if (MODE.delta) buildDelta(); else { branches = []; junctionY = canvas.height; }
        generateForest();
        generateDecor();
        structures = [];
        if (MODE.base) buildBase();
        if (!poolsInitialized) {
            for (let i=0;i<MAX_SALMON;i++) salmonPool.push(createSalmon());
            for (let i=0;i<MAX_WORKERS;i++) workerPool.push(createWorker());
            for (let i=0;i<MAX_ENEMIES;i++) enemyPool.push(createEnemy());
            for (let i=0;i<MAX_PROJECTILES;i++) projPool.push({ active:false, x:0, y:0, vx:0, vy:0, dmg:0, kind:'enemyBeaver' });
            for (let i=0;i<MAX_BIRDS;i++) birdPool.push({ active:false, x:0, y:0, vx:0, dropX:0, dropped:false });
            for (let i=0;i<MAX_EGGS;i++) eggPool.push({ active:false, x:0, y:0, y0:0, vy:0, landY:0 });
            for (let i=0;i<MAX_EXPLOSIONS;i++) exploPool.push({ active:false, x:0, y:0, r:0, life:0 });
            poolsInitialized = true;
        }
    }
    function generateForest() {
        trees = [];
        const rows = 6, cols = 3;
        for (let side=0; side<2; side++) {
            let bankLeft, bankRight;
            if (side===0) { bankLeft = 30; bankRight = riverLeft - 40; }
            else { bankLeft = riverRight + 40; bankRight = canvas.width - 30; }
            let bankWidth = bankRight - bankLeft;
            if (bankWidth <= 0) continue;
            let forestBottom = MODE.base ? canvas.height*0.72 : canvas.height - 120;
            let colWidth = bankWidth / cols, rowHeight = (forestBottom - 100) / rows;
            for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
                let baseX = bankLeft + colWidth*c + colWidth/2, baseY = 100 + rowHeight*r + rowHeight/2;
                let jx = (Math.random()-0.5)*colWidth*0.6, jy = (Math.random()-0.5)*rowHeight*0.6;
                trees.push({ x:baseX+jx, y:baseY+jy, active:true, hp:3, respawnTimer:0 });
            }
        }
        // Delta: no trees in the water or on the outposts
        if (MODE.delta) trees = trees.filter(t => !inWater(t.x, t.y) && t.y < canvas.height*0.78);
    }
    // ---- Delta world: the river forks below a junction into two branches,
    //      each ending at an enemy outpost. The wide branch is a slower dam
    //      build; the narrow one is quick. ----
    // Woodland dressing: flowers, mushrooms, rocks, grass, stumps on the land.
    function generateDecor() {
        decor = []; fireflies = [];
        const types = ['grass','grass','grass','flower','flower','mushroom','rock','fern','stump'];
        let tries = 0;
        while (decor.length < 80 && tries++ < 600) {
            let x = 20 + Math.random()*(canvas.width-40), y = 70 + Math.random()*(canvas.height-100);
            if (inWater(x, y)) continue;
            if (MODE.delta && y > canvas.height*0.78) continue;
            decor.push({ x, y, type: types[Math.floor(Math.random()*types.length)], seed: Math.random()*10 });
        }
        for (let i=0;i<14;i++) fireflies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, ph: Math.random()*Math.PI*2 });
    }
    function buildDelta() {
        junctionY = canvas.height * 0.52;
        let topY = junctionY + 70;
        branches = [
            { cx: canvas.width*0.20, w: riverWidth*0.95, topY, botY: canvas.height, blocked:false, blueprint:null,
              outpost: { x: canvas.width*0.20, y: canvas.height-48, destroyed:false }, spawnTimer: 420 },
            { cx: canvas.width*0.80, w: riverWidth*0.55, topY, botY: canvas.height, blocked:false, blueprint:null,
              outpost: { x: canvas.width*0.80, y: canvas.height-48, destroyed:false }, spawnTimer: 660 }
        ];
    }
    // Is this point in water? (endless: the river strip; delta: stem + fork channels + branches)
    function inWater(x, y) {
        for (let ch of channels) if (ch.filled) { for (let i=0;i<ch.pts.length;i+=2) { let p=ch.pts[i]; if (p.dug && Math.hypot(p.x-x, p.y-y) < 15) return true; } }
        if (!MODE.delta) return x > riverLeft && x < riverRight;
        if (y < junctionY) return x > riverLeft && x < riverRight;
        for (let b of branches) {
            if (y <= b.topY) {
                let t = (y - junctionY) / (b.topY - junctionY);
                let cx = dam.x + (b.cx - dam.x)*t, cw = riverWidth + (b.w - riverWidth)*t;
                if (Math.abs(x - cx) < cw/2) return true;
            } else if (Math.abs(x - b.cx) < b.w/2) return true;
        }
        return false;
    }
    // Pull a river creature back into the nearest channel at its y
    function clampToWater(e) {
        if (inWater(e.x, e.y)) return;
        if (!MODE.delta) { e.x = Math.max(riverLeft+8, Math.min(riverRight-8, e.x)); return; }
        if (e.y < junctionY) { e.x = Math.max(riverLeft+8, Math.min(riverRight-8, e.x)); return; }
        let best=null, bd=Infinity;
        for (let b of branches) {
            let t = Math.min(1, (e.y - junctionY) / (b.topY - junctionY));
            let cx = dam.x + (b.cx - dam.x)*t, cw = riverWidth + (b.w - riverWidth)*t;
            let d = Math.abs(e.x - cx);
            if (d < bd) { bd=d; best={cx, cw}; }
        }
        if (best) e.x = Math.max(best.cx-best.cw/2+8, Math.min(best.cx+best.cw/2-8, e.x));
    }
    // The developers' base: a construction compound across the bottom of the map.
    function buildBase() {
        let W = canvas.width, H = canvas.height;
        structures = [
            { type:'trailer', x: riverLeft*0.42,                       y: H*0.86, w:96,  h:46, ruined:false },
            { type:'trailer', x: riverRight + (W-riverRight)*0.58,     y: H*0.88, w:96,  h:46, ruined:false },
            { type:'crane',   x: riverRight + (W-riverRight)*0.22,     y: H*0.90, w:26,  h:110, ruined:false },
            { type:'lumber',  x: riverLeft*0.75,                       y: H*0.94, w:74,  h:26, ruined:false },
            { type:'lumber',  x: riverLeft + riverWidth*0.5,           y: H*0.955,w:80,  h:26, ruined:false },
            { type:'fence',   x: W*0.5,                                y: H*0.80, w:W,   h:8,  ruined:false }
        ];
    }

    // ============================== SPAWN =============================
    function createSalmon() { return { active:false, x:0, y:0, wpX:null, wpY:null, speed:1+Math.random()*1.5, wiggleOffset:Math.random()*Math.PI*2, wiggleSpeed:0.05+Math.random()*0.05, size:20 }; }
    function createWorker() { return { active:false, x:0, y:0, speed:FISH_SPEED, shape:'fish', ranged:false, scale:1, dmgMult:1, counters:1, maxCounters:1, state:STATE.GATHERING, carryingLog:false, harvestTimer:0, targetTree:null, attackTimer:0, fireTimer:0, hitFlash:0, guardX:null, guardY:0, guardTimer:0, depositX:0, wanderX:null, wanderY:0, wanderT:0, bob:0, spd:1 }; }
    function createEnemy() { return { active:false, x:0, y:0, kind:'developer', counters:4, maxCounters:4, attackTimer:0, state:'approach', hitFlash:0, attackX:0, fromTop:false, scale:1 }; }
    function spawnSalmon() {
        for (let s of salmonPool) if (!s.active) {
            s.active = true; s.wpX = null; s.wpY = null;
            if (MODE.delta) {
                // salmon run up an OPEN branch to the junction, then up the stem
                let open = branches.filter(b=>!b.blocked);
                let b = open.length ? open[Math.floor(Math.random()*open.length)] : null;
                if (b) { s.x = b.cx + (Math.random()-0.5)*b.w*0.7; s.y = canvas.height + 20; s.wpX = dam.x + (Math.random()-0.5)*riverWidth*0.6; s.wpY = junctionY - 20; }
                else { s.x = riverLeft + 20 + Math.random()*(riverWidth-40); s.y = junctionY - 20; }
            } else { s.x = riverLeft + Math.random()*riverWidth; s.y = canvas.height + 20; }
            break;
        }
    }
    function spawnWorker(shape, x, y, counters, speed, ranged, scale, dmgMult) {
        for (let w of workerPool) if (!w.active) {
            w.active=true; w.x=x; w.y=y; w.shape=shape; w.scale=scale||1; w.dmgMult=dmgMult||1;
            w.counters=counters; w.maxCounters=counters; w.speed=speed; w.ranged=!!ranged;
            w.state=STATE.GATHERING; w.carryingLog=false; w.harvestTimer=0; w.targetTree=null;
            w.attackTimer=0; w.fireTimer=0; w.hitFlash=0; w.guardX=null; w.guardTimer=0; w.depositX=0; w.wanderX=null; w.wanderT=0; w.buildBranch=null; w.digChannel=null;
            w.bob = Math.random()*Math.PI*2; w.spd = 0.8 + Math.random()*0.3;
            raised[shape] = (raised[shape]||0) + 1;
            break;
        }
    }
    function spawnEnemy(kind, branch) {
        let k = KIND[kind];
        for (let e of enemyPool) if (!e.active) {
            e.active=true; e.kind=kind; e.counters=k.counters; e.maxCounters=k.counters; e.attackTimer=0; e.state='approach'; e.hitFlash=0; e.wpX=null; e.wpY=null; e.scale=1;
            if (branch) {
                // Delta: enemies pour out of the branch outposts and travel up the branch
                e.x = branch.cx + (Math.random()-0.5)*branch.w*0.6;
                e.y = canvas.height - 70 - Math.random()*30;
                e.fromTop = false;
                e.wpX = dam.x + (Math.random()-0.5)*riverWidth*0.5;
                e.wpY = junctionY - 30;
            } else {
                // Developers ONLY come by land (sides); bears from any direction;
                // everyone else from the sides or up the river.
                let sides;
                if (kind==='developer')  sides = ['left','right'];
                else if (kind==='bear')  sides = ['top','bottom','left','right'];
                else                     sides = ['bottom','left','right'];
                let side = sides[Math.floor(Math.random()*sides.length)];
                if (side==='top')         { e.x = dam.x + (Math.random()-0.5)*riverWidth*0.8; e.y = -20; e.fromTop = true; }

    // ============================= SYSTEMS ============================
    function update() {
        frameCount++;
        if (gameState === 'intro') {   // the comic reads itself; any input skips it
            if (frameCount - introShownAt > 100) { introShownAt = frameCount; advanceIntro(); }
            return;
        }
        if (godMode) beaver.hp = beaver.maxHp;
        if (damGod) dam.hp = dam.maxHp;
        if (gameState !== 'playing' || choosingUpgrade) return;
        if (drag.active || digDraw.active || pickingDam.active) return;   // time stops while commanding
        if (jobMenu.open || groupMenu.open) {   // slow-mo while a command wheel is open
            slowmoAccum += SLOWMO_FACTOR;
            if (slowmoAccum < 1) return;
            slowmoAccum -= 1;
            if (jobMenu.open && (!jobMenu.worker || !jobMenu.worker.active)) closeJobMenu();
        }
        runFrames++;
        if (MODE.surviveFrames && runFrames >= MODE.surviveFrames) { winGame(); return; }
        currentAura = beaver.stun > 0 ? 0 : beaver.baseKillRadius * UP.auraMult * devAuraMult;
        if (--salmonTimer <= 0) { spawnSalmon(); salmonTimer = UP.salmonEvery; }
        if (frenzyTimer > 0) frenzyTimer--;
        updateBeaver(); updateTrees(); updateSalmon(); updateWorkers(); workerPhysics(); updateEnemies(); updateBoss(); updateProjectiles(); updateBirds(); updateEggs(); updateExplosions(); updateDam(); updateFlood(); updateBurstFX(); updateFloatTexts();
    }
    function updateBeaver() {
        if (beaver.hitFlash > 0) beaver.hitFlash--;
        if (beaver.stun > 0) { beaver.stun--; if (beaver.stun === 0) beaver.hp = beaver.maxHp * 0.5; return; }
        let dx=0, dy=0;
        if (keys['w']||keys['arrowup']) dy=-1;
        if (keys['s']||keys['arrowdown']) dy=1;
        if (keys['a']||keys['arrowleft']) dx=-1;
        if (keys['d']||keys['arrowright']) dx=1;
        if (dx!==0||dy!==0) {
            beaver.tx = null; beaver.ty = null;
            if (dx!==0&&dy!==0) { dx*=0.707; dy*=0.707; }
            beaver.x += dx*beaver.speed; beaver.y += dy*beaver.speed;
        } else if (beaver.tx !== null) {
            let ddx = beaver.tx - beaver.x, ddy = beaver.ty - beaver.y, d = Math.hypot(ddx, ddy);
            if (d <= beaver.tapSpeed) { beaver.x = beaver.tx; beaver.y = beaver.ty; beaver.tx = null; beaver.ty = null; }
            else { beaver.x += (ddx/d)*beaver.tapSpeed; beaver.y += (ddy/d)*beaver.tapSpeed; }
        }
        beaver.x = Math.max(15, Math.min(canvas.width-15, beaver.x));
        beaver.y = Math.max(15, Math.min(canvas.height-15, beaver.y));
    }
    function updateTrees() { for (let t of trees) if (!t.active && !t.dead) { t.respawnTimer--; if (t.respawnTimer<=0) { t.active=true; t.hp=3; } } }
    function updateSalmon() {
        for (let s of salmonPool) {
            if (!s.active) continue;
            if (s.wpY !== null && s.wpY !== undefined) {
                let dxw = s.wpX - s.x, dyw = s.wpY - s.y, dw = Math.hypot(dxw,dyw)||1;
                s.x += (dxw/dw)*s.speed; s.y += (dyw/dw)*s.speed;
                if (dw < 14) s.wpY = null;
            } else s.y -= s.speed;
            s.wiggleOffset += s.wiggleSpeed;
            let drawX = s.x + Math.sin(s.wiggleOffset)*20;
            if (currentAura > 0 && Math.hypot(drawX-beaver.x, s.y-beaver.y) < currentAura) {
                s.active=false;
                spawnWorker('fish', drawX, s.y, UP.fishCounters, FISH_SPEED*UP.workerSpeedMult);  // rises free
                beaver.hp = Math.min(beaver.maxHp, beaver.hp + UP.heal);
                if (DAM_UP.soulXp > 0) dam.xp += DAM_UP.soulXp;   // the turbine hums
                gainFrenzy(FRENZY_GAIN_SALMON);

                continue;
            }

        }

    // ---- Crowd machinery: a uniform grid + a push-apart pass, so the horde
    //      jostles and bounces off each other instead of stacking into one
    //      pixel. Bodies may overlap a little on either side — no more. ----
    const __grid = new Map();
    function buildWorkerGrid() {
        __grid.clear();
        for (let w of workerPool) {
            if (!w.active) continue;
            let k2 = (Math.floor(w.x/36)*10000 + Math.floor(w.y/36));
            let arr = __grid.get(k2); if (!arr) { arr=[]; __grid.set(k2, arr); }
            arr.push(w);
        }
    }
    function neighborsOf(w) {
        let cx2 = Math.floor(w.x/36), cy2 = Math.floor(w.y/36), out=[];
        for (let gx=cx2-1; gx<=cx2+1; gx++) for (let gy=cy2-1; gy<=cy2+1; gy++) {
            let arr = __grid.get(gx*10000+gy); if (arr) for (let o of arr) out.push(o);
        }
        return out;
    }
    function workerPhysics() {
        buildWorkerGrid();
        for (let w of workerPool) {
            if (!w.active) continue;
            for (let o of neighborsOf(w)) {
                if (o === w || !o.active) continue;
                let minD = 13 * ((w.scale||1) + (o.scale||1)) / 2;
                let dx = w.x-o.x, dy = w.y-o.y, d = Math.hypot(dx,dy);
                if (d === 0) { w.x += Math.random()-0.5; w.y += Math.random()-0.5; continue; }
                if (d < minD) { let push = (minD-d)/2; w.x += (dx/d)*push; w.y += (dy/d)*push; o.x -= (dx/d)*push; o.y -= (dy/d)*push; }
            }
        }
    }
    // Boids-style move: seek the goal, shove off neighbours, per-unit sway.
    // (6.1's herd code, resurrected as the Frenzy swarm engine.)
    function herdMove(w, gx, gy, spd) {
        let dx = gx - w.x, dy = gy - w.y, gd = Math.hypot(dx,dy) || 1;
        let vx = dx/gd, vy = dy/gd;
        let sx = 0, sy = 0;
        for (let o of neighborsOf(w)) {
            if (o===w || !o.active) continue;
            let ox = w.x-o.x, oy = w.y-o.y, od = Math.hypot(ox,oy);
            if (od > 0 && od < 16) { sx += (ox/od)*(16-od)/16; sy += (oy/od)*(16-od)/16; }
        }
        let sway = Math.sin(frameCount*0.12 + w.bob) * 0.35;
        let mx = vx + sx*1.3 + (-vy)*sway;
        let my = vy + sy*1.3 + ( vx)*sway;
        let md = Math.hypot(mx,my) || 1;
        let s = (spd || w.speed) * w.spd;
        w.x += (mx/md)*s; w.y += (my/md)*s;
    }
    function updateWorkers() {
        buildWorkerGrid();

            if (!w.active) continue;

            // ---- BERSERKER: charges the nearest enemy anywhere, never gathers ----
            if (w.state === STATE.BERSERK) {
                if (boss.active && bossInReach()) { if (!workerHitBoss(w)) moveTowards2(w, boss.x, boss.y+boss.h/2, w.speed); continue; }
                let e = findNearestEnemy(w.x, w.y, true);   // melee: can't reach flying drones

                    let d = Math.hypot(e.x-w.x, e.y-w.y);
                    if (d < 22 + (e.scale-1)*14) { w.attackTimer++; if (w.attackTimer >= UP.attackInterval) { w.attackTimer=0; e.counters-=UP.dmgPerHit*2*(w.dmgMult||1); e.hitFlash=FLASH_FRAMES; w.hitFlash=FLASH_FRAMES; SFX.hit(); } }
                    else moveTowards2(w, e.x, e.y, w.speed);
                } else {
                    let px = dam.x + (Math.random()-0.5)*8;

                }

            }
            if (w.state === STATE.DEFENDING) {
                if (boss.active) {
                    w.guardTimer = GUARD_DURATION;

                    if (w.ranged) { if (bd < WORKER_FIRE_RANGE) { w.fireTimer++; if (w.fireTimer>=WORKER_FIRE_INTERVAL){ w.fireTimer=0; spawnProjectile(w.x,w.y,bx2,by2,UP.dmgPerHit,'friendly'); SFX.pew(); } } else moveTowards(w, bx2, by2); }
                    else { if (!workerHitBoss(w)) moveTowards(w, bx2, by2); }

                }
                let e = findNearestEnemy(w.x, w.y, !w.ranged);   // melee defenders can't reach flying drones
                if (e) {
                    w.guardTimer = GUARD_DURATION;
                    let d = Math.hypot(e.x-w.x, e.y-w.y);
                    if (w.ranged) {
                        if (d < WORKER_FIRE_RANGE) {
                            w.fireTimer++;
                            if (w.fireTimer >= WORKER_FIRE_INTERVAL) { w.fireTimer=0; spawnProjectile(w.x, w.y, e.x, e.y, UP.dmgPerHit, 'friendly'); SFX.pew(); }
                            if (d < 22 + (e.scale-1)*14) { w.attackTimer++; if (w.attackTimer >= UP.attackInterval) { w.attackTimer=0; e.counters-=workerDmg(w); if (w.shape==='fish') w.counters--; e.hitFlash=FLASH_FRAMES; w.hitFlash=FLASH_FRAMES; if (w.counters<=0){ w.active=false; break; } } }
                        } else { moveTowards(w, e.x, e.y); }
                    } else {
                        if (d < 24 + (e.scale-1)*14) {
                            w.attackTimer++;
                            if (w.attackTimer >= UP.attackInterval) { w.attackTimer=0; e.counters-=workerDmg(w); if (w.shape==='fish') w.counters--; e.hitFlash=FLASH_FRAMES; w.hitFlash=FLASH_FRAMES; SFX.hit(); if (w.counters<=0){ w.active=false; break; } }
                        } else { moveTowards(w, e.x, e.y); }
                    }
                } else {
                    // No ground threat: ranged defenders snipe bombing birds
                    // within a third of the screen.
                    if (w.ranged) {
                        let bird=null, bm=canvas.width*BIRD_SNIPE_RANGE_FRAC;
                        for (let b of birdPool) { if (!b.active) continue; let d2=Math.hypot(b.x-w.x, b.y-w.y); if (d2<bm) { bm=d2; bird=b; } }
                        if (bird) { w.fireTimer++; if (w.fireTimer>=WORKER_FIRE_INTERVAL) { w.fireTimer=0; spawnProjectile(w.x, w.y, bird.x+bird.vx*12, bird.y, UP.dmgPerHit, 'friendly'); SFX.pew(); } }
                    }
                    // Guard duty: hold a random post on the dam, then back to work.
                    if (w.guardX === null) { w.guardX = dam.x - dam.w/2 + 14 + Math.random()*(dam.w-28); w.guardY = dam.y + (Math.random()-0.5)*Math.max(10, dam.h); w.guardTimer = GUARD_DURATION; }
                    if (Math.hypot(w.guardX-w.x, w.guardY-w.y) > 6) { moveTowards(w, w.guardX, w.guardY); }

                }
                continue;
            }
            // ---- DIGGING: excavate the drawn channel point by point ----
            if (w.state === STATE.DIGGING) {
                let ch = w.digChannel;
                if (!ch || ch.done) { w.digChannel=null; w.state=STATE.GATHERING; continue; }
                let pt = null;

                if (!pt) {
                    ch.done = true; w.digChannel=null; w.state=STATE.GATHERING;

                    continue;
                }

                if (d < 12) {
                    w.harvestTimer++;
                    if (w.harvestTimer > 16) {
                        w.harvestTimer = 0; pt.dug = true;
                        if (frameCount - lastChopSfx > 4) { SFX.chop(); lastChopSfx = frameCount; }
                        for (let t of trees) if (Math.hypot(t.x-pt.x, t.y-pt.y) < 28) { t.active=false; t.dead=true; }   // nothing grows over a trench
                    }

                continue;
            }
            // ---- free undead worker: autonomous gather, haul to the dam ----
            if (w.state===STATE.GATHERING || w.state===STATE.SWINGING || w.state===STATE.IDLE) {
                if (!w.carryingLog) {
                    if (!w.targetTree || !w.targetTree.active) { w.targetTree = findNearestTree(w.x, w.y); w.state=STATE.GATHERING; }
                    if (w.targetTree) {
                        let dist = Math.hypot(w.targetTree.x-w.x, w.targetTree.y-w.y);
                        if (dist < 15) {
                            w.state=STATE.SWINGING; w.harvestTimer++;
                            if (w.harvestTimer > UP.chopTime) {
                                w.harvestTimer=0; w.targetTree.hp--;

                                if (w.targetTree.hp <= 0) {

                                    w.targetTree.active=false; w.targetTree.respawnTimer=TREE_RESPAWN_TIME; w.carryingLog=true; w.state=STATE.HAULING; w.targetTree=null;
                                }
                            }

                }

                let bb = (w.buildBranch && w.buildBranch.blueprint && !w.buildBranch.blocked) ? w.buildBranch : null;
                if (w.buildBranch && !bb) w.buildBranch = null;   // blueprint finished or washed out
                let depositX, targetY;
                if (bb) { depositX = bb.cx + (Math.random()-0.5)*4; targetY = bb.blueprint.y; }
                else { depositX = Math.max(dam.x - dam.w/2 + 10, Math.min(dam.x + dam.w/2 - 10, w.depositX || dam.x)); targetY = dam.y + dam.h/2 + 14; }
                if (Math.hypot(depositX-w.x, targetY-w.y) < 20) {
                    w.carryingLog=false; SFX.thunk();
                    if (bb) {
                        bb.blueprint.have++;
                        if (bb.blueprint.have >= bb.blueprint.need) { bb.blocked = true; floatText(bb.cx, bb.blueprint.y-26, 'BRANCH DAMMED — the water shifts', '#4fc3f7'); SFX.level(); }
                    } else dam.xp++;
                    if (w.shape==='fish') w.counters--;   // only fish wear out; raised zombies serve until destroyed

        }
    }
    function updateEnemies() {

                let count = 3 + Math.floor(dam.level/2) + devWaveBonus;

                enemySpawnTimer = (Math.max(150, 360 - dam.level*15) + Math.random()*ENEMY_SPAWN_VAR*0.7) * devSpawnScale;
            }
        }
        if (MODE.delta && dam.level >= 2 && !flood.active) {
            for (let b of branches) {

                        let kk = pickEnemyKind(); if (!kk) continue;
                        if (b.blocked && KIND[kk].lane === 'river') kk = 'developer';   // no water below your dam — boats can't come up
                        spawnEnemy(kk, b);
                    }
                    let solo = branches.some(o => o!==b && o.outpost.destroyed) ? 0.55 : 1;   // the last camp fights harder

        }

        if (gameState === 'playing' && !flood.active) {
            for (const key in devRates) {
                let rate = devRates[key];
                if (!rate || rate <= 0) continue;
                devRateAcc[key] = (devRateAcc[key]||0) + rate/1800;
                while (devRateAcc[key] >= 1) {
                    devRateAcc[key] -= 1;

            if (e.counters <= 0) {

                e.wpY = null;
            }
            // ---- PIRANHA: a river creature. Stays in the water, hunts your
            //      skeletons near the banks; netted in the aura -> berserker ----
            if (k.huntsWorkers) {
                if (beaver.stun === 0 && Math.hypot(e.x-beaver.x, e.y-beaver.y) < 24) {
                    e.touchTimer = (e.touchTimer||0) + 1;
                    if (e.touchTimer >= ENEMY_ATTACK_INTERVAL) { e.touchTimer=0; beaver.hp -= k.touchDmg; beaver.hitFlash=FLASH_FRAMES; SFX.hurt(); if (beaver.hp<=0){ beaver.hp=0; beaver.stun=BEAVER_STUN; SFX.stun(); } }
                }
                if (currentAura > 0 && Math.hypot(e.x-beaver.x, e.y-beaver.y) < currentAura) {
                    spawnBerserker(e.x, e.y, k);
                    e.active=false; SFX.raise();
                    continue;
                }
                let prey=null, pm=Infinity;
                for (let w of workerPool) { if (!w.active) continue; if (!inWater(w.x, w.y)) continue; let d2=Math.hypot(w.x-e.x, w.y-e.y); if (d2<pm) { pm=d2; prey=w; } }
                if (prey) {
                    let d = Math.hypot(prey.x-e.x, prey.y-e.y);
                    if (d < 22) { e.attackTimer++; if (e.attackTimer >= ENEMY_ATTACK_INTERVAL) { e.attackTimer=0; prey.counters--; prey.hitFlash=FLASH_FRAMES; e.hitFlash=FLASH_FRAMES; SFX.hit(); if (prey.counters<=0) prey.active=false; } }
                    else { e.state='approach'; moveEnemy(e, prey.x, prey.y, k.speed); clampToWater(e); }
                } else {
                    e.state='approach'; e.y -= k.speed*1.4; clampToWater(e);
                    if (e.y < -30) e.active=false;
                }
                continue;
            }
            // Contact damage: brush against ANY enemy and it bites/swings at you
            if (k.touchDmg > 0 && beaver.stun === 0 && Math.hypot(e.x-beaver.x, e.y-beaver.y) < 26*(e.scale||1)) {
                e.touchTimer = (e.touchTimer||0) + 1;
                if (e.touchTimer >= ENEMY_ATTACK_INTERVAL) {
                    e.touchTimer = 0;
                    beaver.hp -= k.touchDmg * (e.scale>1?2:1); beaver.hitFlash = FLASH_FRAMES; SFX.hurt();
                    if (beaver.hp <= 0) { beaver.hp = 0; beaver.stun = BEAVER_STUN; SFX.stun(); }
                }
            }
            let tx = (k.target==='beaver') ? beaver.x : dam.x;
            let ty = (k.target==='beaver') ? beaver.y : dam.y;
            if (k.ranged) {
                let d = Math.hypot(tx-e.x, ty-e.y);
                if (d > k.fireRange) { e.state='approach'; moveEnemy(e, tx, ty, k.speed); if (k.lane==='river' && e.y > dam.y + dam.h) clampToWater(e); }
                else { e.state='fire'; e.attackTimer++; if (e.attackTimer >= k.fireInterval) { e.attackTimer=0; spawnProjectile(e.x, e.y, tx, ty, k.projDmg, k.target==='beaver'?'enemyBeaver':'enemyDam'); SFX.pew(); } }
            } else {
                let edgeY = e.fromTop ? (dam.y - dam.h/2 - 4) : (dam.y + dam.h/2 + 4);
                if (Math.hypot(e.attackX - e.x, edgeY - e.y) > 6) { e.state='approach'; moveEnemy(e, e.attackX, edgeY, k.speed); }
                else { e.state='attack'; e.attackTimer++; if (e.attackTimer >= ENEMY_ATTACK_INTERVAL) { e.attackTimer=0; dam.hp -= k.damDamage * (e.scale>1?3:1) * DAM_UP.resist; dam.hitFlash = FLASH_FRAMES; } }
                for (let o of enemyPool) { if (o!==e && o.active) { let ox=e.x-o.x, oy=e.y-o.y, od=Math.hypot(ox,oy); if (od>0 && od<16) { e.x += (ox/od)*0.6; e.y += (oy/od)*0.6; } } }
                if (e.x > dam.x-dam.w/2-8 && e.x < dam.x+dam.w/2+8) { if (!e.fromTop && e.y < dam.y+dam.h/2) e.y = dam.y+dam.h/2; else if (e.fromTop && e.y > dam.y-dam.h/2) e.y = dam.y-dam.h/2; }
            }
        }
    }
    function clampDamBarrier(e, py) {
        if (e.x < dam.x - dam.w/2 - 6 || e.x > dam.x + dam.w/2 + 6) return;
        let top = dam.y - dam.h/2, bot = dam.y + dam.h/2;
        if (py >= bot && e.y < bot) e.y = bot;
        else if (py <= top && e.y > top) e.y = top;
    }
    function moveEnemy(e, tx, ty, spd) { let py=e.y; let dx=tx-e.x, dy=ty-e.y, d=Math.hypot(dx,dy); if (d>0) { e.x+=(dx/d)*spd; e.y+=(dy/d)*spd; } clampDamBarrier(e, py); }
    function bossInReach() { return boss.active && Math.hypot(boss.x-beaver.x, (boss.y+boss.h/2)-beaver.y) < currentAura + boss.w/2; }
    function workerHitBoss(w) {
        if (!boss.active) return false;
        if (Math.abs(w.x-boss.x) < boss.w/2 + 16 && Math.abs(w.y-boss.y) < boss.h/2 + 16) {
            w.attackTimer++;
            if (w.attackTimer >= UP.attackInterval) { w.attackTimer=0; boss.counters-=workerDmg(w); boss.hitFlash=FLASH_FRAMES; if (w.shape==='fish') w.counters--; w.hitFlash=FLASH_FRAMES; SFX.hit(); if (w.counters<=0) w.active=false; }
            return true;
        }
        return false;
    }
    function spawnBoss() {
        boss.active = true;
        boss.counters = 450 + boss.tier*250; boss.maxCounters = boss.counters;   // a real fight: the horde no longer deletes it in seconds
        boss.w = Math.min(200, riverWidth*0.72);
        boss.x = dam.x; boss.y = canvas.height + boss.h;
        boss.hitFlash=0; boss.state='approach'; boss.damTimer=0; boss.gunTimer=90; boss.summonTimer=170; boss.shoveTimer=140;

    }
    function defeatBoss() {
        boss.active=false; boss.tier++; bossKills++; bossNextLevel = MODE.bossHunt ? dam.level + 2 : dam.level + 5;
        if (MODE.bossHunt && bossKills >= MODE.bossHunt) { winGame(); return; }
        for (let k=0;k<4;k++) spawnExplosion(boss.x+(Math.random()-0.5)*boss.w, boss.y+(Math.random()-0.5)*boss.h);

    }
    function updateBoss() {
        if (!MODE.boss) return;
        if (!boss.active) { if (dam.level >= bossNextLevel) spawnBoss(); return; }
        if (boss.hitFlash>0) boss.hitFlash--;
        if (boss.counters <= 0) { defeatBoss(); return; }
        let enr = boss.counters < boss.maxCounters*0.25 ? 2.0 : (boss.counters < boss.maxCounters*0.5 ? 1.5 : 1.0);
        let stopY = dam.y + dam.h/2 + boss.h/2 + 6;
        if (boss.y > stopY) { boss.y -= 0.9; boss.state='approach'; } else { boss.y = stopY; boss.state='attack'; }
        for (let w of workerPool) { if (!w.active) continue; let dx=w.x-boss.x, dy=w.y-boss.y; if (Math.abs(dx) < boss.w/2+12 && Math.abs(dy) < boss.h/2+12) { let d=Math.hypot(dx,dy)||1; w.x += (dx/d)*2.4; w.y += (dy/d)*2.4; } }
        if (--boss.shoveTimer <= 0) { boss.shoveTimer = Math.round(150/enr); for (let w of workerPool){ if(!w.active)continue; let dx=w.x-boss.x, dy=w.y-boss.y, d=Math.hypot(dx,dy); if (d>0 && d<190){ w.x+=(dx/d)*56; w.y+=(dy/d)*56; } } SFX.boom(); }
        if (--boss.gunTimer <= 0) { boss.gunTimer = Math.round(64/enr); spawnProjectile(boss.x, boss.y-boss.h*0.4, beaver.x, beaver.y, 13, 'enemyBeaver'); SFX.pew(); }
        if (--boss.summonTimer <= 0) { boss.summonTimer = Math.round(240/enr); spawnEnemy('developer'); spawnEnemy('developer'); if (enr>1) spawnEnemy('developer'); }
        if (boss.state==='attack') { if (--boss.damTimer <= 0) { boss.damTimer = Math.round(48/enr); dam.hp -= 16*DAM_UP.resist; dam.hitFlash = FLASH_FRAMES; } }
