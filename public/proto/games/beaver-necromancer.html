    function updateProjectiles() {
        for (let p of projPool) {
            if (!p.active) continue;
            p.x += p.vx; p.y += p.vy;
            if (p.kind === 'friendly') {
                if (boss.active && Math.abs(p.x-boss.x)<boss.w/2 && Math.abs(p.y-boss.y)<boss.h/2) { boss.counters-=p.dmg; boss.hitFlash=FLASH_FRAMES; p.active=false; continue; }
                let hit = false;
                for (let e of enemyPool) { if (!e.active) continue; if (Math.hypot(e.x-p.x, e.y-p.y) < 14) { e.counters -= p.dmg; e.hitFlash = FLASH_FRAMES; p.active=false; hit=true; break; } }
                if (hit) continue;
                for (let b of birdPool) { if (!b.active) continue; if (Math.hypot(b.x-p.x, b.y-p.y) < 15) { p.active=false; hit=true; if (Math.random() < 0.25) { b.active=false; birdSkipNext=true; spawnExplosion(b.x, b.y); SFX.boom(); floatText(b.x, b.y-20, 'BIRD DOWN — next raid cancelled', '#ffd54f'); } break; } }
                if (hit) continue;
            } else if (p.kind === 'enemyDam') {
                if (beaver.stun === 0 && Math.hypot(beaver.x-p.x, beaver.y-p.y) < 16) {   // eviction notices hurt beavers too
                    p.active=false; beaver.hp -= p.dmg; beaver.hitFlash = FLASH_FRAMES; SFX.hurt();
                    if (beaver.hp <= 0) { beaver.hp = 0; beaver.stun = BEAVER_STUN; SFX.stun(); }
                    continue;
                }
                if (Math.hypot(dam.x-p.x, dam.y-p.y) < 30) { p.active=false; dam.hp -= p.dmg*DAM_UP.resist; dam.hitFlash = FLASH_FRAMES; continue; }
            } else {
                if (beaver.stun === 0 && Math.hypot(beaver.x-p.x, beaver.y-p.y) < 16) {
                    p.active=false; beaver.hp -= p.dmg; beaver.hitFlash = FLASH_FRAMES; SFX.hurt();
                    if (beaver.hp <= 0) { beaver.hp = 0; beaver.stun = BEAVER_STUN; SFX.stun(); }
                    continue;
                }
            }
            if (p.x < -20 || p.x > canvas.width+20 || p.y < -20 || p.y > canvas.height+20) p.active=false;
        }
    }
    function workerDmg(w) { return (w.shape==='fish' ? UP.dmgPerHit*0.5 : UP.dmgPerHit) * (w.dmgMult||1); }
    function moveTowards(ent, tx, ty) { let dx=tx-ent.x, dy=ty-ent.y, d=Math.hypot(dx,dy); if (d>0) { ent.x+=(dx/d)*ent.speed; ent.y+=(dy/d)*ent.speed; } }
    function moveTowards2(ent, tx, ty, spd) { let dx=tx-ent.x, dy=ty-ent.y, d=Math.hypot(dx,dy); if (d>0) { ent.x+=(dx/d)*spd; ent.y+=(dy/d)*spd; } }
    function findNearestTree(x, y) { let n=null, m=Infinity; for (let t of trees){ if(!t.active)continue; let d=Math.hypot(t.x-x,t.y-y); if(d<m){m=d;n=t;} } return n; }
    function findNearestEnemy(x, y, excludeFlying) { let n=null, m=Infinity; for (let e of enemyPool){ if(!e.active)continue; if (excludeFlying && e.kind==='drone') continue; let d=Math.hypot(e.x-x,e.y-y); if(d<m){m=d;n=e;} } return n; }
    function nearestWorker(x, y) { let n=null, m=Infinity; for (let w of workerPool){ if(!w.active)continue; let d=Math.hypot(w.x-x,w.y-y); if(d<m){m=d;n=w;} } return n; }
    function updateBirds() {
        if (dam.level >= BIRD_UNLOCK_LEVEL) { birdSpawnTimer--; if (birdSpawnTimer<=0) { if (birdSkipNext) birdSkipNext=false; else spawnBird(); birdSpawnTimer = BIRD_SPAWN_MIN + Math.random()*BIRD_SPAWN_VAR; } }
        for (let b of birdPool) {
            if (!b.active) continue;
            b.x += b.vx;
            if (!b.dropped && ((b.vx>0 && b.x>=b.dropX) || (b.vx<0 && b.x<=b.dropX))) { spawnEgg(b.x, b.y); b.dropped=true; SFX.chirp(); }
            if (b.x < -60 || b.x > canvas.width+60) b.active=false;
        }
    }
    function updateEggs() {
        for (let e of eggPool) {
            if (!e.active) continue;
            e.vy += EGG_GRAVITY; e.y += e.vy;
            if (e.y >= e.landY) { e.active=false; eggExplode(e.x, e.landY); }
        }
    }
    function eggExplode(x, y) {
        spawnExplosion(x, y);
        SFX.boom();
        if (beaver.stun===0 && Math.hypot(beaver.x-x, beaver.y-y) < EGG_RADIUS) {
            beaver.hp -= EGG_DMG; beaver.hitFlash = FLASH_FRAMES;
            if (beaver.hp <= 0) { beaver.hp=0; beaver.stun=BEAVER_STUN; SFX.stun(); }
        }
        for (let w of workerPool) { if (w.active && Math.hypot(w.x-x, w.y-y) < EGG_RADIUS) w.active=false; }
    }
    function updateExplosions() {
        for (let ex of exploPool) { if (!ex.active) continue; ex.r += (EGG_RADIUS - ex.r)*0.4; ex.life--; if (ex.life<=0) ex.active=false; }
    }
    let damGunTimer = 90;
    function updateDam() {
        if (dam.hitFlash > 0) dam.hitFlash--;
        // The dam defends itself: a bone-sprung stick ballista on the crest
        if (dam.level >= 2) {
            damGunTimer--;
            if (damGunTimer <= 0) {
                damGunTimer = Math.max(40, 130 - dam.level*8);
                let tgt=null, tm=280;
                for (let e of enemyPool) { if (!e.active) continue; let d=Math.hypot(e.x-dam.x, e.y-dam.y); if (d<tm) { tm=d; tgt=e; } }
                if (boss.active && Math.hypot(boss.x-dam.x, boss.y-dam.y) < 300) tgt = { x:boss.x, y:boss.y };
                if (tgt) { spawnProjectile(dam.x + (Math.random()-0.5)*dam.w*0.6, dam.y, tgt.x, tgt.y, 1, 'friendly'); SFX.pew(); }
            }
        }
        if (dam.hp < dam.maxHp) dam.hp = Math.min(dam.maxHp, dam.hp + DAM_REGEN*DAM_UP.regenMult);
        if (dam.hp <= 0) {
            if (dam.level > 1) {
                dam.level--; dam.h = Math.max(30, dam.h - 15);
                dam.xpToNext = Math.max(10, Math.round(dam.xpToNext / 1.8));
                dam.xp = Math.floor(dam.xpToNext * 0.9);
                dam.hp = dam.maxHp; dam.hitFlash = FLASH_FRAMES;
            } else {
                gameOver();
            }
        }
        if (dam.xp >= dam.xpToNext) { dam.xp=0; dam.level++; dam.xpToNext=Math.floor(dam.xpToNext*1.8); dam.h+=15; SFX.level(); if (dam.level % 2 === 0 && dam.level >= 4) spawnGiant(); if (dam.level > maxLevelReached) { maxLevelReached = dam.level; offerUpgrades(); } }
    }

    // ============================= FRENZY =============================
    // Kill-charged meter; unleash to pull the whole horde into a swarm
    // around the beaver with boosted speed/damage for a few seconds.
    function gainFrenzy(n) { if (frenzyTimer<=0) frenzyCharge = Math.min(FRENZY_MAX, frenzyCharge + n); burstCharge = Math.min(FRENZY_MAX, burstCharge + n*3); }
    function floatText(x, y, txt, col) { floatTexts.push({ x, y, txt, col: col||'#fff', life: 90 }); if (floatTexts.length > 12) floatTexts.shift(); }
    function updateFloatTexts() { for (let t of floatTexts) { t.y -= 0.35; t.life--; } floatTexts = floatTexts.filter(t=>t.life>0); }
    function drawFloatTexts() { for (let t of floatTexts) { ctx.globalAlpha = Math.min(1, t.life/30); ctx.fillStyle=t.col; ctx.font='bold 14px Courier New'; ctx.textAlign='center'; ctx.fillText(t.txt, t.x, t.y); } ctx.globalAlpha=1; }
    function tryFrenzy() {
        if (gameState!=='playing' || frenzyTimer>0 || frenzyCharge < FRENZY_MAX) return;
        frenzyCharge = 0; frenzyTimer = FRENZY_DURATION;
        SFX.frenzy();
    }
    // Each frenzied undead gets a slot on a concentric orbit ring around the
    // beaver, so the swarm reads as a visible, countable horde instead of a
    // pile. They attack anything they pass on the way in.
    // The inner horde traces a slowly rotating PENTAGRAM; overflow forms
    //      circles around the star. Of course it's a pentagram.
    function pentagramVerts(rot) {
        let R = 84, v = [];
        for (let i=0;i<5;i++) { let a = -Math.PI/2 + i*(Math.PI*2/5) + rot; v.push({ x: Math.cos(a)*R, y: Math.sin(a)*R }); }
        return v;
    }
    const PENT_ORDER = [0,2,4,1,3,0];
    function frenzySlot(i) {
        let rot = frameCount*0.012;
        let verts = pentagramVerts(rot);
        let edgeLen = Math.hypot(verts[0].x-verts[2].x, verts[0].y-verts[2].y);
        let starCap = Math.max(10, Math.floor((edgeLen*5)/25));
        if (i < starCap) {
            let tt = (i/starCap)*5, seg = Math.floor(tt), frac = tt-seg;
            let a2 = verts[PENT_ORDER[seg]], b2 = verts[PENT_ORDER[seg+1]];
            return { x: beaver.x + a2.x + (b2.x-a2.x)*frac, y: beaver.y + a2.y + (b2.y-a2.y)*frac };
        }
        let idx = i - starCap, r = 84 + 44, ring = 0;
        for (;;) {
            let cap = Math.max(8, Math.floor((Math.PI*2*r) / 25));
            if (idx < cap) {
                let a3 = (idx/cap)*Math.PI*2 - rot*(ring%2===0?1:-1) + ring*0.5;
                return { x: beaver.x + Math.cos(a3)*r, y: beaver.y + Math.sin(a3)*r };
            }
            idx -= cap; r += FRENZY_RING_GAP + 6; ring++;
        }
    }
    function updateFrenzied(w, idx) {
        let spd = w.speed * FRENZY_SPEED_MULT;
        let cadence = Math.max(5, Math.round(UP.attackInterval*0.5));
        let dmg = (UP.dmgPerHit + FRENZY_DMG_BONUS) * (w.shape==='berserker' ? 2 : 1) * (w.dmgMult||1);   // fish hit at FULL power in frenzy — that's the point of it
        // The swarm engulfs the boss if it's near the beaver
        if (boss.active && Math.hypot(boss.x-beaver.x, (boss.y+boss.h/2)-beaver.y) < FRENZY_HUNT_RADIUS + boss.w/2) {
            if (Math.abs(w.x-boss.x) < boss.w/2 + 16 && Math.abs(w.y-boss.y) < boss.h/2 + 16) {
                w.attackTimer++;
                if (w.attackTimer >= cadence) { w.attackTimer=0; boss.counters-=dmg; boss.hitFlash=FLASH_FRAMES; w.hitFlash=FLASH_FRAMES; SFX.hit(); }  // frenzy costs no counters
            } else herdMove(w, boss.x, boss.y+boss.h/2, spd);
            return;
        }
        // Attack anything encountered on the way in (melee: not flying drones)
        let e = findNearestEnemy(w.x, w.y, true);
        if (e && Math.hypot(e.x-w.x, e.y-w.y) < 130) {
            let d = Math.hypot(e.x-w.x, e.y-w.y);
            if (d < 24 + (e.scale-1)*14) {
                w.attackTimer++;
                if (w.attackTimer >= cadence) { w.attackTimer=0; e.counters-=dmg; e.hitFlash=FLASH_FRAMES; w.hitFlash=FLASH_FRAMES; SFX.hit(); }  // frenzy costs no counters
            } else moveTowards2(w, e.x, e.y, spd);
            return;
        }
        // Otherwise take your slot in the orbit and hold formation
        let slot = frenzySlot(idx);
        let d = Math.hypot(slot.x-w.x, slot.y-w.y);
        if (d > 5) moveTowards2(w, slot.x, slot.y, Math.min(spd, d));
        else { w.x = slot.x; w.y = slot.y; }
    }

    // ---- WATER BURST: double-tap detonation. Drowns the small, dents the
    //      large, and floods any dug channel it touches. Charges 3x faster
    //      than Frenzy. ----
    function waterBurst(x, y) {
        burstCharge = 0;
        burstFX.push({ x, y, r: 0, life: 26 });
        SFX.boom(); SFX.flood();
        for (let e of enemyPool) {
            if (!e.active) continue;
            if (Math.hypot(e.x-x, e.y-y) > 95) continue;
            if ((e.scale||1) > 1) { e.counters -= 8; e.hitFlash = FLASH_FRAMES; }
            else { e.active = false; let k = KIND[e.kind]; if (k.becomesBerserker) spawnBerserker(e.x, e.y, k); else zombify(e, true); }
        }
        if (boss.active && Math.hypot(boss.x-x, (boss.y)-y) < 130) { boss.counters -= 10; boss.hitFlash = FLASH_FRAMES; }
        for (let ch of channels) if (!ch.filled) {
            if (ch.pts.some(p => p.dug && Math.hypot(p.x-x, p.y-y) < 95)) fillChannel(ch);
        }
    }
    function fillChannel(ch) {
        ch.filled = true;
        for (let e of enemyPool) {
            if (!e.active) continue;
            if (ch.pts.some(p => p.dug && Math.hypot(p.x-e.x, p.y-e.y) < 22)) {
                e.active = false; let k = KIND[e.kind];
                if (k.becomesBerserker) spawnBerserker(e.x, e.y, k); else zombify(e, true);
                flood.raised++;
                spawnExplosion(e.x, e.y);
            }
        }
        floatText(ch.pts[Math.floor(ch.pts.length/2)].x, ch.pts[Math.floor(ch.pts.length/2)].y-16, 'THE WATER TAKES THE NEW PATH', '#4fc3f7');
    }
    function updateBurstFX() { for (let b of burstFX) { b.r += (95 - b.r)*0.3; b.life--; } burstFX = burstFX.filter(b=>b.life>0); }

    // ============================= MISSION ============================
    // Delta mission: the release routes through whatever branches are OPEN.
    // One open branch = a concentrated surge that smashes that branch's
    // outpost. Two open branches = the surge splits and is too weak — it
    // drowns enemies but the camps survive. Dam a branch to aim the river.
    function floodReady() { return gameState==='playing' && MODE.floodTarget && dam.level >= MODE.floodTarget && !flood.active; }
    function beaverOnDam() { return Math.abs(beaver.x-dam.x) < dam.w/2 && Math.abs(beaver.y-dam.y) < dam.h/2 + 30; }
    function openBranches() { return branches.filter(b => !b.blocked); }
    function tryFlood(needOnDam) {
        if (!floodReady()) return;
        if (needOnDam && !beaverOnDam()) return;
        flood.active = true; flood.y = dam.y + dam.h/2; flood.shake = 60;
        flood.split = MODE.delta ? openBranches().length !== 1 : false;
        if (flood.split) floatText(dam.x, dam.y+60, 'THE SURGE WILL SPLIT — dam a branch to aim it!', '#ffd54f');
        SFX.flood();
    }
    // Water segments the surge occupies at height y (delta routes into open branches)
    function floodSegments(y) {
        if (!MODE.delta || y < junctionY) {
            let frac = Math.min(1, (y - dam.y) / (canvas.height*0.25));
            return [{ left: riverLeft - frac*30, right: riverRight + frac*30 }];
        }
        let segs = [];
        for (let b of openBranches()) {
            if (y <= b.topY) {
                let t = (y - junctionY) / (b.topY - junctionY);
                let cx = dam.x + (b.cx - dam.x)*t, cw = riverWidth + (b.w - riverWidth)*t;
                segs.push({ left: cx-cw/2, right: cx+cw/2 });
            } else segs.push({ left: b.cx-b.w/2 - 26, right: b.cx+b.w/2 + 26 });   // the surge overtops the banks
        }
        return segs;
    }
    function updateFlood() {
        if (!flood.active) return;
        if (flood.shake > 0) flood.shake--;
        flood.y += FLOOD_WAVE_SPEED;
        let segs = floodSegments(flood.y);
        // Drown everything the water touches: enemies rise as undead
        for (let e of enemyPool) {
            if (!e.active) continue;
            if (e.y > dam.y && e.y < flood.y && segs.some(sg => e.x > sg.left-14 && e.x < sg.right+14)) {
                e.active = false;
                let k = KIND[e.kind];
                if (k.becomesBerserker) spawnBerserker(e.x, e.y, k); else zombify(e, true);
                flood.raised++;
                spawnExplosion(e.x, e.y);
            }
        }
        // Overflow finds every dug channel it touches
        for (let ch of channels) {
            if (ch.filled) continue;
            if (ch.pts.some(p => p.dug && p.y > dam.y && p.y < flood.y && segs.some(sg => p.x > sg.left-14 && p.x < sg.right+14))) fillChannel(ch);
        }
        // A concentrated surge smashes the outpost at the end of its branch
        if (MODE.delta && !flood.split) {
            for (let b of openBranches()) {
                if (!b.outpost.destroyed && flood.y >= b.outpost.y - 20) {
                    b.outpost.destroyed = true;
                    for (let i=0;i<4;i++) spawnExplosion(b.outpost.x+(Math.random()-0.5)*90, b.outpost.y+(Math.random()-0.5)*40);
                    SFX.boom();
                    floatText(b.outpost.x, b.outpost.y-60, 'OUTPOST DESTROYED', '#4fc3f7');
                }
            }
        }
        if (flood.y > canvas.height + 80) {
            flood.active = false;
            if (!MODE.delta) { winGame(); return; }
            // Branch dams wash out with the release — the delta resets
            for (let b of branches) { b.blocked = false; b.blueprint = null; }
            for (let w of workerPool) if (w.active) w.buildBranch = null;
            if (branches.every(b => b.outpost.destroyed)) { winGame(); return; }
            // The reservoir is spent: the dam drops back and must be raised again
            dam.level = Math.max(1, dam.level - 3);
            dam.h = 30 + 15*(dam.level-1);
            dam.xp = 0; dam.xpToNext = Math.floor(10 * Math.pow(1.8, dam.level-1));
            dam.hp = dam.maxHp;
            floatText(dam.x, dam.y+60, flood.split ? 'TOO WEAK — the camps stand. Rebuild!' : 'ONE CAMP LEFT — raise the dam again!', '#ffd54f');
        }
    }

    // ============================= RENDER =============================
    function render() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if (gameState==='intro') { drawIntro(); return; }
        if (gameState==='menu') { drawMenu(); return; }
        if (gameState==='missionSelect') { drawMissionSelect(); return; }
        if (gameState==='briefing') { drawBriefing(); return; }
        ctx.save();
        if (flood.shake > 0) ctx.translate((Math.random()-0.5)*6, (Math.random()-0.5)*6);
        drawBackground(); drawDecor(); drawChannels(); drawDelta(); drawStructures(); drawTrees(); drawDam(); drawBoss(); drawFloodWave(); drawSalmon(); drawWorkers(); drawEnemies(); drawProjectiles(); drawEggs(); drawBirds(); drawBeaver(); drawExplosions(); drawBurstFX(); drawFireflies(); drawFloatTexts();
        ctx.restore();
        drawUI(); drawBossBar(); drawObjective();
        if (frenzyTimer > 0) drawFrenzyVignette();
        if (drag.active) drawDragBox();
        if (groupMenu.open) drawGroupMenu();
        if (jobMenu.open) drawJobMenu();
        if (gameState==='playing' && choosingUpgrade) drawUpgradeCards();
        if (gameState==='paused') drawPauseScreen();
        else if (gameState==='over') drawGameOver();
        else if (gameState==='won') drawVictory();
    }
    function drawBackground() {
        ctx.fillStyle='#26401f'; ctx.fillRect(0,0,canvas.width,canvas.height);   // mossy forest floor
        ctx.fillStyle='rgba(0,0,0,0.10)';                                          // soft ground mottling
        for (let i=0;i<7;i++) { let gx=(i*387)%canvas.width, gy=(i*251)%canvas.height; ctx.beginPath(); ctx.ellipse(gx, gy, 130, 70, i, 0, Math.PI*2); ctx.fill(); }
        if (MODE.delta) {
            // main stem down to the junction
            ctx.fillStyle='#1a3c4e'; ctx.fillRect(riverLeft, 0, riverWidth, junctionY);
            // fork channels + branches
            for (let b of branches) {
                let open = !b.blocked;
                ctx.fillStyle = open ? '#1a3c4e' : '#1a3c4e';
                ctx.beginPath();
                ctx.moveTo(riverLeft, junctionY); ctx.lineTo(riverRight, junctionY);
                ctx.lineTo(b.cx + b.w/2, b.topY); ctx.lineTo(b.cx - b.w/2, b.topY);
                ctx.closePath(); ctx.fill();
                if (b.blocked && b.blueprint) {
                    // dammed: water above the branch dam, dry bed below it
                    ctx.fillStyle='#1a3c4e'; ctx.fillRect(b.cx-b.w/2, b.topY, b.w, Math.max(0, b.blueprint.y - b.topY));
                    ctx.fillStyle='#2e2213'; ctx.fillRect(b.cx-b.w/2, b.blueprint.y, b.w, b.botY - b.blueprint.y);
                    ctx.fillStyle='rgba(64,120,140,0.35)';   // leftover puddles
                    for (let i=0;i<5;i++) { ctx.beginPath(); ctx.ellipse(b.cx + Math.sin(i*3.7)*b.w*0.3, b.blueprint.y + 40 + i*((b.botY-b.blueprint.y-60)/5), 14, 5, 0, 0, Math.PI*2); ctx.fill(); }
                } else {
                    ctx.fillStyle='#1a3c4e'; ctx.fillRect(b.cx-b.w/2, b.topY, b.w, b.botY - b.topY);
                    // flow lines — stronger when the OTHER branch is dammed (the river shifted here)
                    let boosted = branches.some(o => o!==b && o.blocked);
                    ctx.strokeStyle = `rgba(120,200,220,${boosted ? 0.35 : 0.14})`; ctx.lineWidth=2;
                    for (let i=0;i<(boosted?4:2);i++) {
                        let lx = b.cx - b.w/4 + i*(b.w/(boosted?6:3));
                        ctx.beginPath();
                        for (let yy=b.topY; yy<=b.botY; yy+=16) ctx.lineTo(lx + Math.sin(yy*0.05 - frameCount*0.12)*4, yy);
                        ctx.stroke();
                    }
                }
            }
        } else {
            ctx.fillStyle='#5c4a2e'; ctx.fillRect(riverLeft-5, 0, riverWidth+10, canvas.height);   // muddy banks
            ctx.fillStyle='#1f5568'; ctx.fillRect(riverLeft, 0, riverWidth, canvas.height);
            ctx.strokeStyle='rgba(140,210,230,0.13)'; ctx.lineWidth=2;                              // lazy current
            for (let i=0;i<3;i++) {
                let lx = riverLeft + riverWidth*(0.25+i*0.25);
                ctx.beginPath();
                for (let yy=0; yy<=canvas.height; yy+=16) ctx.lineTo(lx + Math.sin(yy*0.04 - frameCount*0.1 + i*2)*5, yy);
                ctx.stroke();
            }
        }
        // The reservoir: held-back water above the dam, brighter as the dam grows.
        let resTop = dam.y - dam.h/2;
        let fill = Math.min(1, dam.level / (MODE.floodTarget || 10));
        ctx.fillStyle = `rgba(42,91,116,${0.5+0.5*fill})`; ctx.fillRect(riverLeft, 0, riverWidth, resTop);
        ctx.strokeStyle = `rgba(120,200,220,${0.10+0.18*fill})`; ctx.lineWidth=2;
        for (let i=0;i<4;i++) {
            let ry = resTop * (0.25 + i*0.2);
            ctx.beginPath();
            for (let xx=riverLeft; xx<=riverRight; xx+=18) ctx.lineTo(xx, ry + Math.sin(xx*0.04 + frameCount*0.04 + i*2)*4);
            ctx.stroke();
        }
    }
    function drawChannels() {
        for (let ch of channels) {
            for (let i=0;i<ch.pts.length-1;i++) {
                let a = ch.pts[i], b = ch.pts[i+1];
                if (a.dug && b.dug) {
                    ctx.strokeStyle = ch.filled ? '#1f5568' : '#3b2b18';
                    ctx.lineWidth = 13; ctx.lineCap='round';
                    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
                    if (ch.filled) {
                        ctx.strokeStyle = 'rgba(140,210,230,0.35)'; ctx.lineWidth = 3;
                        let off = Math.sin(frameCount*0.12 + i)*2;
                        ctx.beginPath(); ctx.moveTo(a.x, a.y+off); ctx.lineTo(b.x, b.y+off); ctx.stroke();
                    } else {
                        ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
                    }
                } else {
                    ctx.setLineDash([5,5]); ctx.strokeStyle = 'rgba(201,168,106,0.6)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); ctx.setLineDash([]);
                }
            }
            ctx.lineCap='butt';
        }
        // live dig-draw preview
        if (digDraw.active) {
            ctx.fillStyle='rgba(10,10,30,0.35)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if (digDraw.pts.length) {
                ctx.setLineDash([7,5]); ctx.strokeStyle='#8d6e63'; ctx.lineWidth=6;
                ctx.beginPath();
                for (let i=0;i<digDraw.pts.length;i++) { let p=digDraw.pts[i]; if (i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); }
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke(); ctx.setLineDash([]);
            }
            ctx.fillStyle='#ffd54f'; ctx.font='bold 15px Courier New'; ctx.textAlign='center';
            ctx.fillText('DRAW THE CHANNEL \u2014 release to dig · tap to cancel', canvas.width/2, 60);
        }
        // dam-pick highlight: the sites light up, choose one
        if (pickingDam.active) {
            ctx.fillStyle='rgba(10,10,30,0.35)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            let pulse = 0.5 + Math.sin(frameCount*0.2)*0.4;
            for (let b of branches) {
                if (!b.blueprint || b.blocked) continue;
                ctx.strokeStyle = `rgba(79,195,247,${pulse.toFixed(2)})`; ctx.lineWidth = 5;
                ctx.strokeRect(b.cx-b.w/2-8, b.blueprint.y-24, b.w+16, 48);
                ctx.fillStyle = `rgba(79,195,247,${(pulse*0.25).toFixed(2)})`;
                ctx.fillRect(b.cx-b.w/2-8, b.blueprint.y-24, b.w+16, 48);
            }
            ctx.fillStyle='#4fc3f7'; ctx.font='bold 15px Courier New'; ctx.textAlign='center';
            ctx.fillText('CHOOSE A DAM SITE \u2014 tap one · tap elsewhere to cancel', canvas.width/2, 60);
        }
    }
    function drawBurstFX() {
        for (let b of burstFX) {
            let a = b.life/26;
            ctx.strokeStyle=`rgba(79,195,247,${(0.9*a).toFixed(2)})`; ctx.lineWidth=5;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle=`rgba(79,195,247,${(0.25*a).toFixed(2)})`;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r*0.8, 0, Math.PI*2); ctx.fill();
        }
    }
    function drawDecor() {
        for (let d of decor) {
            let x=d.x, y=d.y, sd=d.seed;
            if (d.type==='grass') {
                ctx.strokeStyle='#38602c'; ctx.lineWidth=1.5;
                for (let i=0;i<3;i++) { ctx.beginPath(); ctx.moveTo(x+i*3-3, y); ctx.lineTo(x+i*3-3+(i-1)*2, y-6-((sd*7+i)%4)); ctx.stroke(); }
            } else if (d.type==='flower') {
                let col = ['#f8bbd0','#fff59d','#e1f5fe'][Math.floor(sd)%3];
                ctx.strokeStyle='#38602c'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y-6); ctx.stroke();
                ctx.fillStyle=col;
                for (let i=0;i<4;i++) { let a=i*Math.PI/2+sd; ctx.beginPath(); ctx.arc(x+Math.cos(a)*2.6, y-6+Math.sin(a)*2.6, 2, 0, Math.PI*2); ctx.fill(); }
                ctx.fillStyle='#ffb300'; ctx.beginPath(); ctx.arc(x, y-6, 1.6, 0, Math.PI*2); ctx.fill();
            } else if (d.type==='mushroom') {
                ctx.fillStyle='#e0d6c3'; ctx.fillRect(x-1.5, y-5, 3, 5);
                ctx.fillStyle='#c62828'; ctx.beginPath(); ctx.arc(x, y-5, 4.5, Math.PI, 0); ctx.fill();
                ctx.fillStyle='#fff'; ctx.fillRect(x-2.5, y-7.5, 1.6, 1.6); ctx.fillRect(x+1, y-6.5, 1.4, 1.4);
            } else if (d.type==='rock') {
                ctx.fillStyle='#5a5f57'; ctx.beginPath(); ctx.ellipse(x, y, 6+sd%3, 4, sd, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle='#767c72'; ctx.beginPath(); ctx.ellipse(x-1.5, y-1.5, 3, 1.8, sd, 0, Math.PI*2); ctx.fill();
            } else if (d.type==='fern') {
                ctx.strokeStyle='#2f5d2a'; ctx.lineWidth=1.5;
                for (let i=-2;i<=2;i++) { ctx.beginPath(); ctx.moveTo(x, y); ctx.quadraticCurveTo(x+i*4, y-5, x+i*6, y-3-Math.abs(i)); ctx.stroke(); }
            } else if (d.type==='stump') {
                ctx.fillStyle='#4a3220'; ctx.beginPath(); ctx.ellipse(x, y, 7, 5, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle='#8d6e63'; ctx.beginPath(); ctx.ellipse(x, y-2, 6, 4, 0, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle='#6b4a2b'; ctx.lineWidth=1; ctx.beginPath(); ctx.ellipse(x, y-2, 3.4, 2.2, 0, 0, Math.PI*2); ctx.stroke();

    function drawFireflies() {
        for (let ff of fireflies) {

    // Delta furniture: outposts, branch dams, blueprints

    function drawGroupMenu() {

    function drawStructures() {
        for (let s of structures) {

                for (let i=0;i<5;i++) {
                    let rx = s.x + ((i*37)%Math.max(20,s.w)) - s.w/2, ry = s.y + ((i*23)%20) - 10;
                    ctx.save(); ctx.translate(rx, ry); ctx.rotate((i%5)*0.35);

            }
            if (s.type==='fence') {
                ctx.strokeStyle='#78909c'; ctx.lineWidth=3;
                ctx.beginPath(); ctx.moveTo(0, s.y); ctx.lineTo(canvas.width, s.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, s.y+8); ctx.lineTo(canvas.width, s.y+8); ctx.stroke();

                ctx.fillStyle='#80d8ff'; for (let i=-1;i<=1;i++) ctx.fillRect(s.x+i*24-7, s.y-4, 14, 12);
                ctx.fillStyle='#263238'; ctx.fillRect(s.x-s.w/2+8, s.y+s.h/2-4, 10, 8); ctx.fillRect(s.x+s.w/2-18, s.y+s.h/2-4, 10, 8);
            } else if (s.type==='crane') {
                ctx.strokeStyle='#fdd835'; ctx.lineWidth=5;
                ctx.beginPath(); ctx.moveTo(s.x, s.y+s.h/2); ctx.lineTo(s.x, s.y-s.h/2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(s.x, s.y-s.h/2); ctx.lineTo(s.x-70, s.y-s.h/2+16); ctx.stroke();
                ctx.strokeStyle='#9e9e9e'; ctx.lineWidth=2;
                ctx.beginPath(); ctx.moveTo(s.x-70, s.y-s.h/2+16); ctx.lineTo(s.x-70, s.y-s.h/2+52); ctx.stroke();

            for (let sg of segs) ctx.fillRect(sg.left, yy, sg.right-sg.left, Math.min(12, flood.y-yy));

            ctx.beginPath();

    function counterPips(x, y, current, max, liveColor) {

        let y = startY, any=false; ctx.font='16px Courier New';
        for (let [k,label] of ROSTER_ORDER) { let n = raised[k]||0; if (n>0) { any=true; ctx.fillStyle='#cfcfcf'; ctx.fillText(`${label}   ${n}`, cx, y); y+=26; } }
        if (!any) { ctx.fillStyle='#8a8a8a'; ctx.fillText('(none raised)', cx, y); y+=26; }
        return y;
    }
    function drawGameOver() {
        screenOverlay('rgba(40,6,6,0.92)');
        let cx=canvas.width/2, cy=canvas.height/2;
        ctx.textAlign='center';
        ctx.fillStyle='#e53935'; ctx.font='bold 46px Courier New'; ctx.fillText('THE DAM HAS FALLEN', cx, cy-160);
        ctx.fillStyle='#fff'; ctx.font='17px Courier New';
        ctx.fillText(`Dam reached Level ${maxLevelReached}    ·    Survived ${Math.floor(runFrames/60)}s`, cx, cy-122);
        ctx.fillStyle='#ce93d8'; ctx.font='bold 18px Courier New'; ctx.fillText('SKELETONS RAISED THIS RUN', cx, cy-82);
        let y = drawRoster(cx, cy-52);
        if (Math.floor(frameCount/30)%2===0) { ctx.fillStyle='#ffd54f'; ctx.font='bold 18px Courier New'; ctx.fillText('CLICK or PRESS ANY KEY — back to the riverbank', cx, y+30); }
    }
    function drawVictory() {
        screenOverlay('rgba(6,22,40,0.93)');
        let cx=canvas.width/2, cy=canvas.height/2;
        ctx.textAlign='center';
        ctx.shadowColor='#4fc3f7'; ctx.shadowBlur=18;
        ctx.fillStyle='#4fc3f7'; ctx.font='bold 46px Courier New'; ctx.fillText(MODE.id==='lodge' ? 'THE LODGE STANDS' : (MODE.id==='hunt' ? 'THE FLEET IS SUNK' : 'THE FOREST IS RECLAIMED'), cx, cy-170);
        ctx.shadowBlur=0;
        ctx.fillStyle='#b0d8e8'; ctx.font='italic 15px Courier New'; ctx.fillText('The river runs where the beaver says it runs. The rubble is theirs to keep.', cx, cy-138);
        ctx.fillStyle='#fff'; ctx.font='17px Courier New';
        ctx.fillText(`Dam reached Level ${maxLevelReached}    ·    ${Math.floor(runFrames/60)}s    ·    Drowned by the flood: ${flood.raised}`, cx, cy-100);
        ctx.fillStyle='#ce93d8'; ctx.font='bold 18px Courier New'; ctx.fillText('SKELETONS RAISED THIS RUN', cx, cy-60);
        let y = drawRoster(cx, cy-30);
        if (Math.floor(frameCount/30)%2===0) { ctx.fillStyle='#ffd54f'; ctx.font='bold 18px Courier New'; ctx.fillText('TAP or PRESS ANY KEY — return to the riverbank', cx, y+30); }
    }

    // =========================== DEV TOOLKIT ==========================
    // A real DOM panel (not canvas) so sliders/dropdowns just work.
    function buildDevUI() {
        const btn = document.createElement('div');
        btn.textContent = '\ud83d\udee0';
        btn.style.cssText = 'position:fixed;right:10px;bottom:132px;width:38px;height:38px;line-height:38px;text-align:center;background:#1b1b1b;border:2px solid #7b1fa2;color:#ce93d8;font-size:18px;cursor:pointer;z-index:30;border-radius:6px;';
        document.body.appendChild(btn);
        const panel = document.createElement('div');
        panel.style.cssText = 'position:fixed;right:8px;top:8px;bottom:8px;width:330px;overflow-y:auto;background:rgba(10,8,14,0.96);border:2px solid #7b1fa2;color:#eee;font:12px "Courier New",monospace;padding:10px;z-index:31;display:none;border-radius:6px;';
        document.body.appendChild(panel);
        btn.addEventListener('click', () => { panel.style.display = panel.style.display==='none' ? 'block' : 'none'; refresh(); });

        const num = (id, val, w2) => `<input type="number" id="${id}" value="${val}" style="width:${w2||58}px;background:#111;color:#80d8ff;border:1px solid #555;font:12px Courier New;">`;
        const H = [];
        H.push('<div style="color:#ce93d8;font-weight:bold;font-size:14px;margin-bottom:6px;">\ud83d\udee0 NECRO-DEV CONSOLE <span id="dv_x" style="float:right;color:#e53935;cursor:pointer;font-size:16px;padding:0 6px;border:1px solid #e53935;border-radius:4px;">\u2715</span><span id="dv_fps" style="float:right;color:#8a8a8a;margin-right:8px;"></span></div>');
        H.push('<div style="border-top:1px solid #444;margin:6px 0;padding-top:6px;color:#ffd54f;">RUN</div>');
        H.push('<div>Dam level: <button id="dv_lvldn">\u2212</button> <span id="dv_lvl" style="color:#80d8ff;">?</span> <button id="dv_lvlup">+</button>  <button id="dv_xp">+10 XP</button></div>');
        H.push('<div style="margin-top:4px;">Boon: <select id="dv_boon" style="max-width:170px;"></select> <button id="dv_apply">apply</button></div>');
        H.push('<div style="margin-top:4px;"><label><input type="checkbox" id="dv_god"> Beaver god mode</label>  <label><input type="checkbox" id="dv_damgod"> Dam invincible</label></div>');
        H.push('<div style="margin-top:4px;"><button id="dv_fish">+10 fish</button> <button id="dv_frz">Fill frenzy</button> <button id="dv_burst">Fill burst</button> <button id="dv_kill">Kill enemies</button></div>');
        H.push('<div style="margin-top:4px;"><button id="dv_giant">Spawn giant</button> <button id="dv_win">Win mission</button> <label style="margin-left:6px;"><input type="checkbox" id="dv_music" checked> Music</label></div>');
        H.push('<div style="border-top:1px solid #444;margin:8px 0;padding-top:6px;color:#ffd54f;">BEAVER & WAVES <span style="color:#8a8a8a;">(type any number)</span></div>');
        H.push(`<div>Necrotic field \u00d7 ${num('dv_aura',1)}  Wave size +${num('dv_wave',0,44)}</div>`);
        H.push(`<div style="margin-top:3px;">Wave interval \u00d7 ${num('dv_spawn',1)}  Salmon every ${num('dv_sal',60,50)} ticks</div>`);
        H.push('<div style="border-top:1px solid #444;margin:8px 0;padding-top:6px;color:#ffd54f;">ENEMY EDITOR</div>');
        H.push('<div>Enemy: <select id="dv_kind" style="max-width:180px;"></select></div>');
        H.push('<div id="dv_kindbox" style="margin-top:6px;padding:6px;border:1px solid #444;border-radius:4px;"></div>');
        panel.innerHTML = H.join('');
        const $ = id => panel.querySelector('#'+id);
        $('dv_x').addEventListener('click', () => { panel.style.display='none'; });
        const setLvl = n => { dam.level=Math.max(1,n); dam.h=30+15*(dam.level-1); dam.xp=0; dam.xpToNext=Math.floor(10*Math.pow(1.8,dam.level-1)); maxLevelReached=Math.max(maxLevelReached,dam.level); refresh(); };
        function refresh() { $('dv_lvl').textContent = dam.level; }
        $('dv_lvldn').addEventListener('click', ()=>setLvl(dam.level-1));
        $('dv_lvlup').addEventListener('click', ()=>setLvl(dam.level+1));
        $('dv_xp').addEventListener('click', ()=>{ dam.xp += 10; });
        const allBoons = UPGRADES.concat(DAM_UPGRADES);
        $('dv_boon').innerHTML = allBoons.map((u,i)=>`<option value="${i}">${u.isDam?'[DAM] ':''}${u.name}</option>`).join('');
        $('dv_apply').addEventListener('click', ()=>{ allBoons[+$('dv_boon').value].apply(); SFX.level(); });
        $('dv_god').addEventListener('change', e=>{ godMode = e.target.checked; });
        $('dv_damgod').addEventListener('change', e=>{ damGod = e.target.checked; });
        $('dv_music').addEventListener('change', e=>{ MUSIC.on = e.target.checked; });
        $('dv_fish').addEventListener('click', ()=>{ for(let i=0;i<10;i++) spawnWorker('fish', beaver.x+(Math.random()-0.5)*80, beaver.y+(Math.random()-0.5)*80, UP.fishCounters, FISH_SPEED*UP.workerSpeedMult); });
        $('dv_frz').addEventListener('click', ()=>{ frenzyCharge = FRENZY_MAX; });
        $('dv_burst').addEventListener('click', ()=>{ burstCharge = FRENZY_MAX; });
        $('dv_kill').addEventListener('click', ()=>{ for (let e of enemyPool) e.active=false; boss.active=false; });
        $('dv_giant').addEventListener('click', ()=>{ spawnGiant(); });
        $('dv_win').addEventListener('click', ()=>{ if (MODE.delta) { branches.forEach(b=>b.outpost.destroyed=true); } winGame(); });
        const bindNum = (id, fn) => $(id).addEventListener('input', e=>{ let v=parseFloat(e.target.value); if (!isNaN(v)) fn(v); });
        bindNum('dv_aura', v=>{ devAuraMult = Math.max(0, v); });
        bindNum('dv_wave', v=>{ devWaveBonus = Math.max(0, Math.round(v)); });
        bindNum('dv_spawn', v=>{ devSpawnScale = Math.max(0.05, v); });
        bindNum('dv_sal', v=>{ UP.salmonEvery = Math.max(3, Math.round(v)); });
        // ---- enemy editor: pick a kind, edit its numbers exactly ----
        $('dv_kind').innerHTML = Object.keys(KIND).map(k=>`<option value="${k}">${k}</option>`).join('');
        function renderKindBox() {
            const k = KIND[$('dv_kind').value] ? $('dv_kind').value : 'developer', K = KIND[k];
            $('dv_kindbox').innerHTML =
                `<div style="color:#80d8ff;margin-bottom:4px;">${k}</div>` +
                `<div>health ${num('dv_e_hp', K.counters)}  strength ${num('dv_e_str', K.damDamage)}</div>` +
                `<div style="margin-top:3px;">touch dmg ${num('dv_e_tch', K.touchDmg||0)}  speed ${num('dv_e_spd', K.speed)}</div>` +
                `<div style="margin-top:3px;">skeleton durability ${num('dv_e_dur', K.zombieDur||K.counters)}</div>` +
                `<div style="margin-top:6px;color:#ffd54f;">exact spawn rates (per minute):</div>` +
                `<div style="margin-top:3px;">normal ${num('dv_e_rate', devRates[k]||0)}  giant ${num('dv_e_grate', devRates['giant_'+k]||0)}</div>` +
                `<div style="margin-top:3px;">wave weight ${num('dv_e_wgt', K.weight)}</div>`;
            const b = (id, fn) => panel.querySelector('#'+id).addEventListener('input', e=>{ let v=parseFloat(e.target.value); if (!isNaN(v)) fn(v); });
            b('dv_e_hp',  v=>{ K.counters = Math.max(1, v); });
            b('dv_e_str', v=>{ K.damDamage = Math.max(0, v); });
            b('dv_e_tch', v=>{ K.touchDmg = Math.max(0, v); });
            b('dv_e_spd', v=>{ K.speed = Math.max(0.05, v); });
            b('dv_e_dur', v=>{ K.zombieDur = Math.max(1, v); });
            b('dv_e_rate', v=>{ devRates[k] = Math.max(0, v); });
            b('dv_e_grate', v=>{ devRates['giant_'+k] = Math.max(0, v); });
            b('dv_e_wgt', v=>{ K.weight = Math.max(0, Math.round(v)); });
        }
        $('dv_kind').addEventListener('change', renderKindBox);
        renderKindBox();
        setInterval(()=>{ if (panel.style.display!=='none') $('dv_fps').textContent = __fps + ' fps'; }, 1000);
        setInterval(refresh, 800);
    }
    let __fps = 0, __fpsCount = 0, __fpsLast = 0;

    // ============================== LOOP ==============================
    // Base pace is the classic half-speed (one world tick per two frames);
    // the speed toggle scales that by 1x / 1.5x / 2x via an accumulator.
    let __acc = 0;
    function gameLoop() {
        __acc += 0.5 * SPEEDS[speedIdx];
        while (__acc >= 1) { update(); __acc -= 1; }
        render();
        __fpsCount++;
        let now = Date.now();
        if (now - __fpsLast >= 1000) { __fps = __fpsCount; __fpsCount = 0; __fpsLast = now; }
        requestAnimationFrame(gameLoop);
    }
    resize();
    buildDevUI();
    gameLoop();
    </script>
</body>
</html>
